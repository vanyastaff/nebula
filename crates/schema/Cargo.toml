[package]
name = "nebula-schema"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description = "Schema definition system for Nebula workflow surfaces"
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = []
schemars = ["dep:schemars"]
# Emit a `tracing::debug!` event with the caller location every time
# `SecretString::expose` / `SecretBytes::expose` is called.  Off by default
# because the volume of expose calls in tight retry loops can swamp logs;
# enable when an audit trail is required.
audit-secret-expose = []

[dependencies]
nebula-validator = { path = "../validator" }
nebula-expression = { path = "../expression" }
nebula-schema-macros = { path = "macros" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
indexmap = { workspace = true }
smallvec = { workspace = true }
regex = { workspace = true }
schemars = { version = "1.0", optional = true }
zeroize = { workspace = true }
hex = { workspace = true }
argon2 = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
subtle = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt"] }
trybuild = "1"
proptest = { workspace = true }
insta = { workspace = true }
pretty_assertions = { workspace = true }
rstest = { workspace = true }

[[test]]
name = "flow_all_error_codes"
path = "tests/flow/all_error_codes.rs"

[[test]]
name = "flow_derive_roundtrip"
path = "tests/flow/derive_roundtrip.rs"

[[test]]
name = "proptest_path_roundtrip"
path = "tests/proptest/path_roundtrip.rs"

[[test]]
name = "proptest_serde_preserves"
path = "tests/proptest/serde_preserves.rs"

[[test]]
name = "json_schema_smoke"
path = "tests/json_schema_smoke.rs"
required-features = ["schemars"]

[[example]]
name = "json_schema_export"
path = "examples/json_schema_export.rs"
required-features = ["schemars"]

[[bench]]
name = "bench_build"
harness = false

[[bench]]
name = "bench_validate"
harness = false

[[bench]]
name = "bench_serde"
harness = false

[[bench]]
name = "bench_memory"
harness = false

[[bench]]
name = "bench_resolve"
harness = false

[[bench]]
name = "bench_lookup"
harness = false

[package.metadata.cargo-shear]
# schemars is optional (feature = "schemars") and used via
# `#[cfg_attr(feature = "schemars", derive(JsonSchema))]` attributes on
# schema types; cargo-shear doesn't follow derive-macro call paths.
ignored = ["schemars"]

[lints]
workspace = true
