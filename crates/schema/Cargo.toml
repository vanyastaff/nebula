[package]
name = "nebula-schema"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description = "Schema definition system for Nebula workflow surfaces"
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = []
schemars = ["dep:schemars"]

[dependencies]
nebula-validator = { path = "../validator" }
nebula-expression = { path = "../expression" }
nebula-schema-macros = { path = "macros" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
indexmap = { workspace = true }
smallvec = { workspace = true }
once_cell = { workspace = true }
regex = { workspace = true }
async-trait = { workspace = true }
schemars = { version = "1.0", optional = true }

[dev-dependencies]
criterion = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt"] }
trybuild = "1"
proptest = { workspace = true }
futures = { workspace = true }

[[test]]
name = "flow_all_error_codes"
path = "tests/flow/all_error_codes.rs"

[[test]]
name = "proptest_path_roundtrip"
path = "tests/proptest/path_roundtrip.rs"

[[test]]
name = "proptest_serde_preserves"
path = "tests/proptest/serde_preserves.rs"

[[bench]]
name = "bench_build"
harness = false

[[bench]]
name = "bench_validate"
harness = false

[[bench]]
name = "bench_serde"
harness = false

[[bench]]
name = "bench_memory"
harness = false

[[bench]]
name = "bench_resolve"
harness = false

[[bench]]
name = "bench_lookup"
harness = false
