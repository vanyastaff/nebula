[package]
name = "nebula-plugin"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description = "Plugin system with versioning, registry, and dynamic loading"
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = []

[dependencies]
nebula-plugin-macros = { path = "macros" }
nebula-core = { path = "../core" }
nebula-error = { workspace = true, features = ["derive"] }
nebula-metadata = { path = "../metadata" }
nebula-action = { path = "../action" }
nebula-credential = { path = "../credential" }
nebula-resource = { path = "../resource" }

semver = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
nebula-schema = { path = "../schema" }
insta = { workspace = true }
pretty_assertions = { workspace = true }
rstest = { workspace = true }

[lints]
workspace = true
