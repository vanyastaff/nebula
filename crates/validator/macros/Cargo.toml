[package]
name = "nebula-validator-macros"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description = "Proc-macros for nebula-validator (Validator derive)"
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[lib]
proc-macro = true
doctest = false

[dependencies]
nebula-macro-support = { path = "../../sdk/macros-support" }
syn = { version = "2.0", features = ["full", "extra-traits"] }
quote = "1.0"
proc-macro2 = "1.0"

# Used to validate `#[validate(regex = "...")]` patterns at macro-time so
# compile errors surface before runtime.
regex = { workspace = true }
