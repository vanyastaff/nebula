[package]
name = "nebula-validator"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Input validation framework for Nebula workflow engine"
keywords.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[dependencies]
# Derive macros
nebula-validator-macros = { path = "macros" }

# Error handling
thiserror = { workspace = true }
nebula-error = { workspace = true, features = ["derive"] }

# Small vector optimization for error params
smallvec = "1.15"

# Data formats
regex = { workspace = true }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

[dev-dependencies]
proptest = "1"

# Benchmarking
criterion = { workspace = true }

[[example]]
name = "json_validation"

[[bench]]
name = "string_validators"
harness = false

[[bench]]
name = "combinators"
harness = false

[[bench]]
name = "error_construction"
harness = false

