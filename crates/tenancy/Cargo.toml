[package]
name = "nebula-tenancy"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Multi-tenancy security boundary (ScopeResolver + scope-enforcing decorators) for Nebula"
keywords.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[dependencies]
nebula-core = { path = "../core" }
nebula-storage-port = { path = "../storage-port" }
# Credential scope-layer re-home (spec §8): the `CredentialStore`
# scope decorator + its owner resolver move here (the policy half);
# the credential-specific Encryption/Cache/Audit wiring re-composes on
# top in `nebula-storage`. `nebula-credential` is shared infra
# importable from Business — see deny.toml [wrappers].
nebula-credential = { path = "../credential" }
async-trait = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros", "sync"] }
# `make_credential` test fixture stamps StoredCredential timestamps.
chrono = { workspace = true }
# Enable nebula-credential's in-memory `CredentialStore` (behind its
# `test-util` feature) for the credential-scope-layer regression tests.
# Cargo unions this with the normal dependency for test builds, so
# `InMemoryStore` is available under `#[cfg(test)]` without a crate
# feature of our own.
nebula-credential = { path = "../credential", features = ["test-util"] }

[lib]
doctest = false

[lints]
workspace = true
