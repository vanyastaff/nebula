[package]
name = "nebula-api"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description = "Unified API server for Nebula: status, workers, webhook on one port"
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[dependencies]
nebula-webhook = { version = "0.1.0", path = "../webhook" }

tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "sync", "net", "signal"] }
axum = { version = "0.7", features = ["json"] }
tower-http = { version = "0.6", features = ["trace", "cors", "compression-gzip"] }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
thiserror = { workspace = true }
uuid = { workspace = true }
url = { workspace = true }
reqwest = { workspace = true, default-features = false, features = ["json", "rustls-tls"] }

[dev-dependencies]
