[package]
name = "nebula-api"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description = "Unified API server for Nebula: status and workflow endpoints"
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[dependencies]
nebula-error = { workspace = true, features = ["derive"] }
nebula-storage = { path = "../storage", features = ["credential-in-memory"] }
nebula-core = { path = "../core" }
nebula-execution = { path = "../execution" }
nebula-validator = { path = "../validator" }
nebula-metrics = { path = "../metrics" }
nebula-telemetry = { path = "../telemetry" }
nebula-workflow = { path = "../workflow" }
nebula-action = { path = "../action" }
nebula-runtime = { path = "../runtime" }
nebula-plugin = { path = "../plugin" }
nebula-resilience = { path = "../resilience" }
nebula-credential = { path = "../credential", optional = true }

tokio = { workspace = true, features = [
  "rt",
  "rt-multi-thread",
  "macros",
  "sync",
  "net",
  "signal",
  "time",
] }
axum = { workspace = true }
tower = { version = "0.5", features = ["timeout", "util", "limit", "load-shed"] }
tower-http = { workspace = true, features = [
  "trace",
  "cors",
  "compression-full",
  "limit",
  "timeout",
  "catch-panic",
  "set-header",
] }
governor = { version = "0.10", default-features = false, features = ["std", "dashmap"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
uuid = { version = "1.11", features = ["v4", "serde"] }
jsonwebtoken = { workspace = true }
futures = "0.3"
rand = { workspace = true }
reqwest = { workspace = true, default-features = false, features = [
  "json",
  "rustls",
  "form",
], optional = true }
hmac = { workspace = true, optional = true }
sha2 = { workspace = true, optional = true }
base64 = { workspace = true, optional = true }
zeroize = { version = "1.8.2", features = ["zeroize_derive"], optional = true }

# Webhook transport
dashmap = { workspace = true }
moka = { workspace = true, features = ["future"] }
url = { workspace = true }

[dev-dependencies]
nebula-api = { path = ".", features = ["test-util"] }
# Dev-only: the knife integration test wires the A2 consumer + engine
# end-to-end alongside the API producer (see `tests/knife.rs`). Listed in
# `deny.toml` wrappers for the same reason. `InProcessSandbox` is re-exported
# through `nebula-runtime` so we don't need a direct `nebula-sandbox` dep.
nebula-engine = { path = "../engine" }
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt"] }
hex = { workspace = true }
hmac = { workspace = true }
sha2 = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }
tokio-util = { workspace = true }
async-trait = { workspace = true }

[features]
default = []
# Enables `ApiConfig::for_test()` and other test helpers. NEVER
# enable this in production builds — it exposes a constructor that
# bypasses the JwtSecret validation gate.
test-util = []
# OAuth ceremony surface (ADR-0031 rollout gate).
credential-oauth = [
  "dep:nebula-credential",
  "dep:reqwest",
  "dep:hmac",
  "dep:sha2",
  "dep:base64",
  "dep:zeroize",
]

[lints]
workspace = true
