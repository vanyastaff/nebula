[package]
name = "nebula-api"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description = "Unified API server for Nebula: status, workers, webhook on one port"
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[dependencies]
nebula-webhook = { path = "../webhook" }
nebula-ports = { path = "../ports" }
nebula-core = { path = "../core" }

tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "sync", "net", "signal"] }
axum = { workspace = true }
tower-http = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
thiserror = { workspace = true }
uuid = { workspace = true }
url = { workspace = true }
reqwest = { workspace = true, default-features = false, features = ["json", "rustls"] }

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
async-trait = { workspace = true }
