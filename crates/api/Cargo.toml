[package]
name = "nebula-api"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description = "Unified API server for Nebula: status and workflow endpoints"
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[dependencies]
nebula-error = { workspace = true, features = ["derive"] }
nebula-storage = { path = "../storage" }
nebula-config = { path = "../config" }
nebula-core = { path = "../core" }
nebula-validator = { path = "../validator" }
nebula-metrics = { path = "../metrics" }
nebula-telemetry = { path = "../telemetry" }
nebula-workflow = { path = "../workflow" }
nebula-action = { path = "../action" }
nebula-runtime = { path = "../runtime" }
nebula-plugin = { path = "../plugin" }
nebula-resilience = { path = "../resilience" }

tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "sync", "net", "signal", "time"] }
axum = { workspace = true }
tower = { version = "0.5", features = ["timeout", "util", "limit", "load-shed"] }
tower-http = { workspace = true, features = ["trace", "cors", "compression-full", "limit", "timeout", "catch-panic", "set-header"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
uuid = { version = "1.11", features = ["v4", "serde"] }
jsonwebtoken = { workspace = true }
futures = "0.3"
rand = { workspace = true }

# Webhook transport
dashmap = { workspace = true }
url = { workspace = true }
bytes = { workspace = true }
http = { workspace = true }

[dev-dependencies]
nebula-api = { path = ".", features = ["test-util"] }
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt"] }
hex = { workspace = true }
hmac = { workspace = true }
sha2 = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }
tokio-util = { workspace = true }
async-trait = { workspace = true }

[features]
default = []
# Enables `ApiConfig::for_test()` and other test helpers. NEVER
# enable this in production builds — it exposes a constructor that
# bypasses the JwtSecret validation gate.
test-util = []

[lib]
doctest = false
