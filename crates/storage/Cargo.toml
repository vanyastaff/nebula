[package]
name = "nebula-storage"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Storage abstraction for Nebula: key-value backends (memory, Redis, Postgres, S3)"
keywords.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[dependencies]
nebula-core = { path = "../core" }
nebula-credential = { path = "../credential" }

async-trait = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync", "time"] }
chrono = { workspace = true }

# §12.5 primitives used by EncryptionLayer
aes-gcm = "0.10"
argon2 = "0.5"
base64 = { workspace = true }
sha2 = { workspace = true }
rand = { workspace = true }
zeroize = { version = "1.8.2", features = ["zeroize_derive"] }
subtle = { workspace = true }

# Cache + sync primitives
moka = { workspace = true, features = ["future"] }
arc-swap = { workspace = true }
parking_lot = { workspace = true }
scopeguard = "1"

# Utilities
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4", "serde"] }

# Optional backends (см. docs/nebula-architecture-final.md)
sqlx = { version = "0.8", optional = true, features = [
  "runtime-tokio",
  "postgres",
  "migrate",
  "uuid",
  "chrono",
] }
hex = { version = "0.4", optional = true }
redis = { version = "1.2", optional = true, features = ["tokio-comp"] }
aws-config = { version = "1.8", optional = true }
aws-sdk-s3 = { version = "1.129", optional = true }
rmp-serde = { version = "1", optional = true }

[features]
default = []
credential-in-memory = []
# `test-util` forwards nebula-credential/test-util so storage's credential
# tests can reach `nebula_credential::store::test_helpers::make_credential`.
# Must never be enabled in a production release build — see ADR-0023.
test-util = ["nebula-credential/test-util"]
postgres = ["dep:sqlx", "dep:hex"]
redis = ["dep:redis"]
s3 = ["dep:aws-config", "dep:aws-sdk-s3"]
msgpack-storage = ["dep:rmp-serde"]

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }

[lib]
doctest = false

[package.metadata.cargo-shear]
# Optional backend deps: declared under feature flags (`redis`, `s3`)
# whose backend implementations live behind the feature guard. Kept
# declared so the backend surface is stable even while implementation
# is landing incrementally.
#
# P6 placeholder deps — used by store/memory/layer/key_provider files
# populated in P6.2-P6.5 (currently empty skeleton modules).
ignored = [
  "aws-config",
  "aws-sdk-s3",
  "redis",
  "aes-gcm",
  "argon2",
  "base64",
  "sha2",
  "rand",
  "zeroize",
  "subtle",
  "moka",
  "arc-swap",
  "parking_lot",
  "scopeguard",
  "tracing",
  "uuid",
]

[lints]
workspace = true
