[package]
name = "nebula-storage"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Storage abstraction for Nebula: key-value backends (memory, Redis, Postgres, S3)"
keywords.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[dependencies]
nebula-core = { path = "../core" }
nebula-credential = { path = "../credential" }

async-trait = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync", "time"] }
chrono = { workspace = true }

# Refresh-claim repo (ADR-0041): generates per-claim UUIDs and uses a
# parking_lot mutex for the in-memory CAS path.
uuid = { workspace = true }
parking_lot = { workspace = true }
# Used for structured logging in layers (audit, cache) and rotation/backup
# restore path. Credential-side rotation also carries `tracing`, so when the
# `rotation` feature is enabled we inherit the same observability surface.
tracing = { workspace = true }

# Storage-local encoding / hashing / zeroizing — used directly by
# KeyProvider fingerprints (base64 + sha2) and FileKeyProvider key
# loading (zeroize). Cache layer uses moka::future.
base64 = { workspace = true }
sha2 = { workspace = true }
zeroize = { version = "1.8.2", features = ["zeroize_derive"] }
moka = { workspace = true, features = ["future"] }

# Optional backends (см. docs/nebula-architecture-final.md). The
# `postgres` and `sqlite` features each turn on this dep, and each
# forwards only its own driver feature to sqlx (`sqlx/postgres` or
# `sqlx/sqlite`). Storage-level: enabling `postgres` alone activates
# only the postgres driver from this crate's perspective. (The
# workspace-level `domain-key` dep enables both `sqlx-postgres` and
# `sqlx-sqlite` features for typed-key impls, which can unify both
# drivers in a multi-crate build; that is a workspace concern, not
# this crate's.)
sqlx = { version = "0.8", optional = true, default-features = false, features = [
  "runtime-tokio",
  "macros",
  "migrate",
  "json",
  "uuid",
  "chrono",
] }
hex = { version = "0.4", optional = true }
redis = { version = "1.2", optional = true, features = ["tokio-comp"] }
aws-config = { version = "1.8", optional = true, default-features = false, features = [
  "credentials-process",
  "default-https-client",
  "rt-tokio",
  "sso",
] }
aws-sdk-s3 = { version = "1.131", optional = true, default-features = false, features = [
  "default-https-client",
  "http-1x",
  "rt-tokio",
  "sigv4a",
] }
rmp-serde = { version = "1", optional = true }

[features]
default = []
credential-in-memory = []
# `test-util` forwards nebula-credential/test-util so storage's credential
# tests can reach `nebula_credential::store::test_helpers::make_credential`.
# Must never be enabled in a production release build — see ADR-0023.
test-util = ["nebula-credential/test-util"]
# `rotation` gates `RotationBackup` on storage's side and forwards to
# `nebula-credential/rotation` so the backup type can reference credential's
# rotation error / id types (ADR-0029 §4, ADR-0032).
rotation = ["nebula-credential/rotation"]
# Postgres backend. TLS is included by default because every managed
# Postgres tier (RDS, Cloud SQL, Neon, Supabase, Azure) requires TLS —
# without this, downstream consumers had to layer the TLS feature
# themselves which silently broke first-time `connect()` attempts in
# production.
#
# We use `sqlx/tls-rustls-ring-native-roots` (pure-rust TLS, system trust
# store on macOS/Windows, /etc/ssl/certs on Linux via rustls-native-certs)
# rather than `sqlx/tls-rustls` (alias for `tls-rustls-ring`, which pulls
# in `tls-rustls-ring-webpki` — bundled Mozilla CAs only). The former
# allows corporate/private-CA Postgres deployments to authenticate
# their CA out of the box; webpki-roots-only would force every
# private-CA user to override the feature flag. Pure-rust avoids
# dragging system openssl into the build matrix. The base `sqlx` dep
# already enables `runtime-tokio`, so the runtime+TLS bundle isn't
# needed separately.
postgres = ["dep:sqlx", "sqlx/postgres", "sqlx/tls-rustls-ring-native-roots", "dep:hex"]
sqlite = ["dep:sqlx", "sqlx/sqlite"]
redis = ["dep:redis"]
s3 = ["dep:aws-config", "dep:aws-sdk-s3"]
msgpack-storage = ["dep:rmp-serde"]

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
# Used by FileKeyProvider tests (key_provider.rs).
tempfile = { workspace = true }
assert_fs = { workspace = true }
insta = { workspace = true }
pretty_assertions = { workspace = true }
rstest = { workspace = true }
# Loom CAS-atomicity probe lives in the sibling crate
# `nebula-storage-loom-probe` to avoid `--cfg loom` polluting transitive
# deps (concurrent-queue, etc.) — see that crate's lib doc.

[lib]
doctest = false

[package.metadata.cargo-shear]
# Optional backend deps: declared under feature flags (`redis`, `s3`)
# whose backend implementations live behind the feature guard. Kept
# declared so the backend surface is stable even while implementation
# is landing incrementally.
ignored = ["aws-config", "aws-sdk-s3", "redis"]

[lints]
workspace = true
