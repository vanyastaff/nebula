[package]
name = "nebula-storage"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Storage abstraction for Nebula: key-value backends (memory, Redis, Postgres, S3)"
keywords.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[dependencies]
nebula-core = { path = "../core" }
nebula-error = { workspace = true, features = ["derive"] }

async-trait = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync", "time"] }

# Optional backends (см. docs/nebula-architecture-final.md)
sqlx = { version = "0.8", optional = true, features = ["runtime-tokio", "postgres", "migrate", "uuid"] }
redis = { version = "1.2", optional = true, features = ["tokio-comp"] }
aws-config = { version = "1.8", optional = true }
aws-sdk-s3 = { version = "1.128", optional = true }
rmp-serde = { version = "1", optional = true }

[features]
default = []
postgres = ["dep:sqlx"]
redis = ["dep:redis"]
s3 = ["dep:aws-config", "dep:aws-sdk-s3"]
msgpack-storage = ["dep:rmp-serde"]

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }

[lib]
doctest = false
