[package]
name = "nebula-resource"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
# Internal crate — only `nebula-sdk` is the public/publishable surface. Guard
# against an accidental `cargo publish` leaking this adapter to crates.io.
publish = false

[features]
default = []
# Gates the credential-rotation fan-out module (`credential_fanout`) and the
# `register_and_bind` method on `ResourceActivatorRegistry` (which stages
# rotation fan-out reverse-index binds before the Manager row is published).
# `scopeguard` is required only for the RAII rollback in `register_and_bind`.
rotation = ["scopeguard"]

[dependencies]
# Nebula ecosystem
nebula-core = { path = "../core" }
nebula-credential = { path = "../credential" }
nebula-eventbus = { path = "../eventbus" }
nebula-expression = { path = "../expression", default-features = false, features = ["cache"] }
nebula-metrics = { path = "../metrics" }
nebula-metadata = { path = "../metadata" }
nebula-resource-macros = { path = "macros" }
nebula-schema = { path = "../schema" }
serde_json = { workspace = true }

# Async runtime
tokio = { workspace = true, features = ["rt", "sync", "time", "macros"] }
tokio-util = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }

# Core
nebula-error = { workspace = true }
arc-swap = { workspace = true }
serde = { workspace = true }
semver = { workspace = true }
dashmap = { workspace = true }
smallvec = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
scopeguard = { workspace = true, optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "test-util"] }
# Dev-only: `tests/resident_rotation_race.rs` and
# `tests/credential_slot_epoch_fold.rs` define a mock `TestCredential` whose
# `State` impl requires `Serialize + Deserialize + ZeroizeOnDrop` per the
# credential contract (hence `serde` + `zeroize` below are dev-only too).
# Production resources never define their own `Credential`/`State` (they
# consume built-ins). No nebula test-util feature needed — ADR-0092 step 8
# removed `test-util` from `nebula-credential`, and this crate never had one.
nebula-credential = { path = "../credential" }
serde = { workspace = true, features = ["derive"] }
zeroize = { version = "1.8.2", features = ["zeroize_derive"] }
insta = { workspace = true }
pretty_assertions = { workspace = true }
rstest = { workspace = true }
trybuild = "1.0"
# `async_tokio` for `Bencher::to_async` — the acquire bench drives the real
# Manager acquire loop on a tokio runtime.
criterion = { workspace = true, features = ["async_tokio"] }

[[bench]]
name = "slotcell"
harness = false

[[bench]]
name = "acquire"
harness = false

[package.metadata.docs.rs]
# Render feature-gated items on docs.rs (build with every feature).
all-features = true

[lints]
workspace = true
