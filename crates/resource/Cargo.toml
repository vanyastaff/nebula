[package]
name = "nebula-resource"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = []

[dependencies]
# Nebula ecosystem
nebula-core = { path = "../core" }
nebula-credential = { path = "../credential" }
nebula-metrics = { path = "../metrics" }
nebula-resilience = { path = "../resilience" }
nebula-metadata = { path = "../metadata" }
nebula-resource-macros = { path = "macros" }
nebula-schema = { path = "../schema" }
nebula-telemetry = { path = "../telemetry" }

# Async runtime
tokio = { workspace = true, features = ["rt", "sync", "time", "macros"] }
tokio-util = { workspace = true }
futures = { workspace = true }

# Core
nebula-error = { workspace = true }
arc-swap = { workspace = true }
semver = { workspace = true }
dashmap = { workspace = true }
smallvec = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "test-util"] }
# `test-util` enables `SchemeFactory::for_test*` and `SchemeGuard::for_test`
# constructors so external integration tests (notably `tests/rotation.rs`) can
# fabricate the rotation-dispatch inputs that production code only constructs
# from inside the credential engine. Per ADR-0023 the feature MUST stay scoped
# to dev-dependencies.
nebula-credential = { path = "../credential", features = ["test-util"] }
# `tests/rotation.rs` defines a mock `TestCredential` whose `State` impl
# requires `Serialize + Deserialize + ZeroizeOnDrop` per the credential
# contract. Production resources never define their own `Credential`/`State`
# (they consume built-ins), so these are dev-only.
serde = { workspace = true, features = ["derive"] }
zeroize = { version = "1.8.2", features = ["zeroize_derive"] }
insta = { workspace = true }
pretty_assertions = { workspace = true }
rstest = { workspace = true }
trybuild = "1.0"

[lints]
workspace = true
