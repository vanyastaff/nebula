[package]
name = "nebula-resource"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = []

[dependencies]
# Nebula ecosystem
nebula-core = { path = "../core" }
nebula-credential = { path = "../credential" }
nebula-eventbus = { path = "../eventbus" }
nebula-metrics = { path = "../metrics" }

# Async runtime
tokio = { version = "1.0", features = ["rt-multi-thread", "time", "sync", "macros"] }
tokio-util = { version = "0.7" }

# Core
thiserror = { workspace = true }
uuid = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
dashmap = { workspace = true }
parking_lot = { workspace = true }
tracing = { workspace = true }
metrics = { workspace = true }
chrono = { workspace = true, features = ["serde"] }

[dev-dependencies]
tokio-test = "0.4"
proptest = { workspace = true }
test-case = "3.3.1"
mockall = { workspace = true }
tempfile = { workspace = true }
criterion = { workspace = true, features = ["async_tokio", "html_reports"] }

[[bench]]
name = "pool_throughput"
harness = false
