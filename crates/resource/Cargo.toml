[package]
name = "nebula-resource"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
default = []
# Gates the credential-rotation fan-out module (`credential_fanout`) and the
# `register_and_bind` method on `ResourceActivatorRegistry` (which stages
# rotation fan-out reverse-index binds before the Manager row is published).
# `scopeguard` is required only for the RAII rollback in `register_and_bind`.
rotation = ["scopeguard"]

[dependencies]
# Nebula ecosystem
nebula-core = { path = "../core" }
nebula-credential = { path = "../credential" }
nebula-eventbus = { path = "../eventbus" }
nebula-expression = { path = "../expression", default-features = false, features = ["cache"] }
nebula-metrics = { path = "../metrics" }
nebula-metadata = { path = "../metadata" }
nebula-resource-macros = { path = "macros" }
nebula-schema = { path = "../schema" }
serde_json = { workspace = true }

# Async runtime
tokio = { workspace = true, features = ["rt", "sync", "time", "macros"] }
tokio-util = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }

# Core
nebula-error = { workspace = true }
arc-swap = { workspace = true }
serde = { workspace = true }
semver = { workspace = true }
dashmap = { workspace = true }
smallvec = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
scopeguard = { workspace = true, optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "test-util"] }
# Dev-only: `tests/rotation.rs` defines a mock `TestCredential` whose `State`
# impl requires `Serialize + Deserialize + ZeroizeOnDrop`. No nebula test-util
# feature needed (ADR-0092 step 8 removed it from nebula-credential).
nebula-credential = { path = "../credential" }
# `tests/rotation.rs` defines a mock `TestCredential` whose `State` impl
# requires `Serialize + Deserialize + ZeroizeOnDrop` per the credential
# contract. Production resources never define their own `Credential`/`State`
# (they consume built-ins), so these are dev-only.
serde = { workspace = true, features = ["derive"] }
zeroize = { version = "1.8.2", features = ["zeroize_derive"] }
insta = { workspace = true }
pretty_assertions = { workspace = true }
rstest = { workspace = true }
trybuild = "1.0"
criterion = { workspace = true }

[[bench]]
name = "slotcell"
harness = false

[lints]
workspace = true
