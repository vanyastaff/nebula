[package]
name = "nebula-resource-macros"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description = "Proc-macros for nebula-resource error classification"
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
# Internal proc-macro crate for nebula-resource — never published standalone.
# Guards against an accidental `cargo publish` leaking this adapter to
# crates.io (matches the `publish = false` precedent on the parent crate).
publish = false

[lib]
proc-macro = true
test = false
doctest = false

[dependencies]
nebula-macro-support = { path = "../../sdk/macros-support" }
syn = { version = "2.0", features = ["full", "extra-traits"] }
quote = "1.0"
proc-macro2 = "1.0"

[dev-dependencies]
nebula-core = { path = "../../core" }

[lints]
workspace = true
