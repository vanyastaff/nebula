[package]
name = "nebula-webhook"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description = "Webhook server infrastructure for Nebula workflow engine"
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[dependencies]
# Nebula crates
nebula-core = { path = "../core" }
nebula-resource = { path = "../resource" }
nebula-resilience = { path = "../resilience" }

# Async runtime
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "sync", "time", "net", "signal"] }
tokio-util = { workspace = true, features = ["rt"] }
async-trait = { workspace = true }

# HTTP server
axum = { workspace = true }
tower-http = { workspace = true }

# Data structures
dashmap = { workspace = true }
uuid = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true, features = ["serde"] }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Crypto (signature verification)
hmac = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }

# HTTP client (outbound webhook delivery)
reqwest = { workspace = true, features = ["json", "rustls"] }

# Logging
tracing = { workspace = true }

# Error handling
nebula-error = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt"] }

[features]
default = []
# Metrics: resource records by default; app config controls export
metrics = []
