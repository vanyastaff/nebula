[package]
name = "nebula-resilience"
description = "Internal Nebula resilience layer for outbound calls: retry, timeout, circuit breaker, bulkhead, rate limiting, fallback, and hedging"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish = false
readme = "README.md"
keywords = ["nebula", "resilience", "retry", "workflow", "reliability"]
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
# Keep boundary type serialization enabled by default for backwards compatibility.
default = ["serde"]

# Enables every optional feature owned by this crate.
full = ["serde"]

# Enables serde for config/value boundary types.
serde = ["dep:serde", "smallvec/serde"]

# Enables loom-backed atomics for model-checking tests when paired with
# `RUSTFLAGS="--cfg loom"`.
loom = ["dep:loom"]

[dependencies]
# Nebula integration
nebula-error = { workspace = true }

# Async runtime
tokio = { workspace = true, features = ["rt", "sync", "time"] }
tokio-util = { workspace = true, features = ["rt"] }

# Error derivation and observability
thiserror = { workspace = true }
tracing = { workspace = true }

# Synchronization and compact storage
parking_lot = { workspace = true }
smallvec = { version = "1.15", features = ["union"] }

# Retry jitter
fastrand = "2.4"

# Optional feature dependencies
serde = { workspace = true, optional = true }
loom = { version = "0.7", optional = true }

[dev-dependencies]
criterion = { workspace = true, features = ["async_tokio"] }
proptest = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time"] }

[lints]
workspace = true

[[bench]]
name = "compose"
harness = false

