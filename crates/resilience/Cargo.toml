[package]
name = "nebula-resilience"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
## Enables the `GovernorRateLimiter` (GCRA algorithm) and the
## `AnyRateLimiter::Governor` variant.  Pulls in the `governor` crate.
governor = ["dep:governor"]

## Enables `serde`-based human-readable Duration serialization via
## `humantime-serde` (e.g. "30s", "1m 30s").  Affects `CommonConfig`.
humantime = ["dep:humantime-serde"]

## Convenience bundle: enables all optional features.
full = ["governor", "humantime"]

[dependencies]
# Async and concurrency
tokio = { workspace = true, features = ["sync", "time"] }

# Errors and serialization
nebula-error = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }

# Utilities
parking_lot = { workspace = true, features = ["arc_lock", "serde"] }
humantime-serde = { version = "1.1.1", optional = true }
governor = { version = "0.10", optional = true }
tokio-util = { workspace = true, features = ["rt"] }
fastrand = "2.4"
loom = { version = "0.7", optional = true }
smallvec = { version = "1.15", features = ["union", "serde"] }
tracing = { workspace = true }

# Only nebula-error — no other internal deps

[dev-dependencies]
criterion = { workspace = true, features = ["async_tokio", "html_reports"] }
futures = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time"] }

[lints]
workspace = true

[[bench]]
name = "compose"
harness = false

[[bench]]
name = "rate_limiter"
harness = false

[[bench]]
name = "timeout"
harness = false

[[bench]]
name = "fallback"
harness = false

[[bench]]
name = "circuit_breaker"
harness = false

[[bench]]
name = "bulkhead"
harness = false

[[bench]]
name = "latency_tracker"
harness = false

[[bench]]
name = "sliding_window_cb"
harness = false

[[bench]]
name = "retry"
harness = false

[[bench]]
name = "gate"
harness = false

[[bench]]
name = "load_shed"
harness = false

[[bench]]
name = "hedge"
harness = false

[package.metadata.cargo-shear]
# humantime-serde is behind the `humantime` feature and is consumed via
# `#[serde(with = "humantime_serde")]` in config types that the feature
# toggles on; cargo-shear does not trace the serde attribute path.
ignored = ["humantime-serde"]
