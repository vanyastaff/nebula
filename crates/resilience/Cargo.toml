[package]
name = "nebula-resilience"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
## Enables the `GovernorRateLimiter` (GCRA algorithm) and the
## `AnyRateLimiter::Governor` variant.  Pulls in the `governor` crate.
governor = ["dep:governor"]

## Enables `serde`-based human-readable Duration serialization via
## `humantime-serde` (e.g. "30s", "1m 30s").  Affects `CommonConfig`.
humantime = ["dep:humantime-serde"]

## Convenience bundle: enables all optional features.
full = ["governor", "humantime"]

[dependencies]
# Async and concurrency
futures = { workspace = true }
tokio = { workspace = true, features = ["sync", "time"] }

# Errors and serialization
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }

# Utilities
parking_lot = { workspace = true, features = ["arc_lock", "serde"] }
dashmap = { workspace = true }
humantime-serde = { version = "1.1.1", optional = true }
governor = { version = "0.10", optional = true }
tokio-util = { workspace = true, features = ["rt"] }
fastrand = "2.3"
tracing = { workspace = true }

# Internal crates
nebula-config = { path = "../config" }
nebula-core = { path = "../core" }
nebula-log = { path = "../log" }

[dev-dependencies]
criterion = { workspace = true, features = ["async_tokio", "html_reports"] }
rand = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time"] }
loom = "0.7"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(loom)'] }

[[bench]]
name = "circuit_breaker"
harness = false

[[bench]]
name = "rate_limiter"
harness = false

[[bench]]
name = "manager"
harness = false

[[bench]]
name = "retry"
harness = false

[[bench]]
name = "compose"
harness = false

[[bench]]
name = "timeout"
harness = false

[[bench]]
name = "bulkhead"
harness = false

[[bench]]
name = "fallback"
harness = false

[[bench]]
name = "hedge"
harness = false

[[bench]]
name = "observability"
harness = false
