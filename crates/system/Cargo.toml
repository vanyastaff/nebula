[package]
name = "nebula-system"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Cross-platform system information and utilities for Nebula ecosystem"
readme = "README.md"
categories = ["os", "api-bindings", "hardware-support"]
keywords = ["system", "cpu", "memory", "hardware", "cross-platform"]

[features]
default = ["sysinfo"]

# Core features
sysinfo = ["dep:sysinfo"]

# Sysinfo sub-features
process = ["sysinfo/system"]
network = ["sysinfo/network"]
disk = ["sysinfo/disk"]

# Optional features
serde = ["dep:serde", "serde_json"]

# Preset combinations
full = ["sysinfo", "process", "network", "disk", "serde"]

[dependencies]
# Internal dependencies
nebula-error = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
parking_lot = { workspace = true }

# Optional dependencies
serde = { workspace = true, optional = true, features = ["derive"] }
serde_json = { workspace = true, optional = true }

# System info
sysinfo = { version = "0.38.4", optional = true, default-features = false, features = [
  "system",
  "multithread",
] }

[target.'cfg(target_os = "linux")'.dependencies]
libc = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
insta = { workspace = true }
pretty_assertions = { workspace = true }
rstest = { workspace = true }

[[bench]]
name = "system_load"
harness = false
required-features = ["sysinfo"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
targets = ["x86_64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-pc-windows-msvc"]

[[example]]
name = "system_basic"
required-features = ["sysinfo"]

[[example]]
name = "memory"
required-features = ["sysinfo"]

[[example]]
name = "cpu"
required-features = ["sysinfo"]

[[example]]
name = "network"
required-features = ["network"]

[[example]]
name = "process"
required-features = ["process"]

[[example]]
name = "disk"
required-features = ["disk"]

[package.metadata.cargo-shear]
# serde_json is pulled in by the `serde` feature (`serde = ["dep:serde",
# "serde_json"]`) for JSON output of system snapshots; cargo-shear does
# not always trace feature-composed optional deps.
ignored = ["serde_json"]

[lints]
workspace = true
