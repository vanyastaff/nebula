[package]
name = "nebula-system"
description = "Internal Nebula host-probing layer for CPU, memory, disk, network, process, and pressure signals"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish = false
readme = "README.md"
keywords = ["nebula", "system", "host", "monitoring", "workflow"]
categories = ["os", "api-bindings", "hardware-support"]
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[features]
# Host identity, memory, CPU, and aggregate load probes are available by default.
default = ["sysinfo"]

# Enables every normal probe surface owned by this crate. Serde is intentionally
# separate so data-model serialization remains opt-in.
full = ["sysinfo", "process", "network", "disk"]

# Enables the shared sysinfo backend used by CPU, memory, OS, hardware, and load probes.
sysinfo = ["dep:sysinfo"]

# Optional probe modules. These enable the matching sysinfo backend feature as needed.
process = ["sysinfo/system"]
network = ["sysinfo/network"]
disk = ["sysinfo/disk"]

# Enables serde derives for public probe data models.
serde = ["dep:serde"]

[dependencies]
# Nebula integration
nebula-error = { workspace = true, features = ["derive"] }

# Error derivation
thiserror = { workspace = true }

# Synchronization
parking_lot = { workspace = true }

# Optional serialization
serde = { workspace = true, optional = true, features = ["derive"] }

# System backend
sysinfo = { version = "0.38.4", optional = true, default-features = false, features = [
  "system",
  "multithread",
] }

[target.'cfg(unix)'.dependencies]
# Unix filesystem/stat helpers and Linux CPU affinity.
libc = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }

[lints]
workspace = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
targets = ["x86_64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-pc-windows-msvc"]

[[bench]]
name = "system_load"
harness = false
required-features = ["sysinfo"]

[[example]]
name = "system_basic"
required-features = ["sysinfo"]

[[example]]
name = "memory"
required-features = ["sysinfo"]

[[example]]
name = "cpu"
required-features = ["sysinfo"]

[[example]]
name = "network"
required-features = ["network"]

[[example]]
name = "process"
required-features = ["process"]

[[example]]
name = "disk"
required-features = ["disk"]
