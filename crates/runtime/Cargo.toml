[package]
name = "nebula-runtime"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description = "Action runtime and execution orchestration for the Nebula workflow engine"
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[dependencies]
nebula-core = { path = "../core" }
nebula-error = { workspace = true, features = ["derive"] }
nebula-action = { path = "../action" }
nebula-sandbox = { path = "../sandbox" }
nebula-metrics = { path = "../metrics" }
nebula-telemetry = { path = "../telemetry" }
async-trait = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
dashmap = { workspace = true }
uuid = { workspace = true }
bytes = { workspace = true }

[dev-dependencies]
nebula-core = { path = "../core" }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time", "test-util"] }
tokio-util = { workspace = true }

[lib]
doctest = false
