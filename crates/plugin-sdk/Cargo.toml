[package]
name = "nebula-plugin-sdk"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description = "Nebula plugin author SDK — write community plugins against the duplex broker protocol"
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[dependencies]
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["io-std", "io-util", "sync", "net"] }
thiserror = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "process", "time", "io-std", "io-util", "sync"] }

[[bin]]
name = "nebula-echo-fixture"
path = "src/bin/echo_fixture.rs"

[[bin]]
name = "nebula-counter-fixture"
path = "src/bin/counter_fixture.rs"
