[package]
name = "nebula-engine"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "Workflow execution engine for Nebula"
license.workspace = true
repository.workspace = true

[features]
default = []
# Convenience alias that forwards `nebula-action`'s `unstable-retry-scheduler`
# feature. Enabling this feature does **not** install a retry scheduler
# (canon §11.2, #290); it only un-hides `ActionResult::Retry` in
# `nebula-action`. The engine's retry-detection path uses the always-
# available `ActionResult::is_retry()` predicate so it is correct under
# Cargo feature unification regardless of whether this mirror feature is
# enabled — the alias exists purely so downstream crates can turn on the
# variant via a single feature on the engine dependency.
unstable-retry-scheduler = ["nebula-action/unstable-retry-scheduler"]
rotation = ["nebula-credential/rotation", "nebula-storage/rotation"]

[dependencies]
nebula-core = { path = "../core" }
nebula-error = { workspace = true }
nebula-action = { path = "../action" }
nebula-expression = { path = "../expression" }
nebula-plugin = { path = "../plugin" }
nebula-workflow = { path = "../workflow" }
nebula-execution = { path = "../execution" }
nebula-schema = { path = "../schema" }
nebula-credential = { path = "../credential" }
nebula-eventbus = { path = "../eventbus" }
nebula-resource = { path = "../resource" }
nebula-runtime = { path = "../runtime" }
nebula-resilience = { path = "../resilience" }
nebula-storage = { path = "../storage", features = ["credential-in-memory"] }
nebula-metrics = { path = "../metrics" }
nebula-telemetry = { path = "../telemetry" }

async-trait = { workspace = true }
semver = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
dashmap = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
serde_json = { workspace = true, features = ["raw_value"] }
chrono = { workspace = true }
rand = { workspace = true }
scopeguard = "1"

[dev-dependencies]
nebula-metrics = { path = "../metrics" }
chrono = { workspace = true }
futures = { workspace = true }
serde = { workspace = true, features = ["derive"] }
zeroize = { version = "1.8.2", features = ["zeroize_derive"] }

[lib]
doctest = false

[lints]
workspace = true
