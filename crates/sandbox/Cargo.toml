[package]
name = "nebula-sandbox"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description = "Plugin sandbox and isolation for the Nebula workflow engine"
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
publish = false

# Plugin-Proto leaf: Core (nebula-metadata) + the plugin protocol
# (nebula-plugin-sdk) only. No Business/Exec dependency — see deny.toml
# and the AGENTS.md "Layered Dependency Map" Plugin-Proto tier.
[dependencies]
nebula-metadata = { path = "../metadata" }
nebula-plugin-sdk = { path = "../plugin-sdk" }

serde_json = { workspace = true }
sha2 = { workspace = true }
tempfile = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true, features = ["process", "io-util", "sync", "net"] }
tokio-util = { workspace = true }
uuid = { workspace = true }

# OS-level sandbox (Linux only)
[target.'cfg(target_os = "linux")'.dependencies]
landlock = "0.4"
nix = { version = "0.31", features = ["resource"] }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time"] }

[lints]
workspace = true
