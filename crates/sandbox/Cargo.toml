[package]
name = "nebula-sandbox"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description = "Plugin sandbox and isolation for the Nebula workflow engine"
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
publish = false

[dependencies]
nebula-action = { path = "../action" }
nebula-core = { path = "../core" }
nebula-credential = { path = "../credential" }
nebula-metadata = { path = "../metadata" }
nebula-plugin = { path = "../plugin" }
nebula-plugin-sdk = { path = "../plugin-sdk" }
nebula-resource = { path = "../resource" }
nebula-schema = { path = "../schema" }

async-trait = { workspace = true }
semver = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
thiserror = { workspace = true }
toml = "1.1"
tracing = { workspace = true }
tokio = { workspace = true, features = ["process", "io-util", "sync", "net"] }
tokio-util = { workspace = true }
uuid = { workspace = true }

# OS-level sandbox (Linux only)
[target.'cfg(target_os = "linux")'.dependencies]
landlock = "0.4"
nix = { version = "0.31", features = ["resource"] }

[dev-dependencies]
insta = { workspace = true }
pretty_assertions = { workspace = true }
rstest = { workspace = true }

[lints]
workspace = true
