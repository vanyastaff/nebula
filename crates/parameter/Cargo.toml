[package]
name = "nebula-parameter"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
keywords.workspace = true
authors.workspace = true
description = "Parameter definition system for Nebula workflow nodes"
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[dependencies]
nebula-error = { workspace = true, features = ["derive"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
regex = { workspace = true }
nebula-validator = { path = "../validator" }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros"] }
reqwest = { workspace = true, features = ["json", "rustls"] }
