[package]
name = "nebula-credential"
version.workspace = true
edition.workspace = true
keywords.workspace = true
authors.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
# Async
async-trait = { workspace = true }
tokio = { workspace = true, features = ["time", "sync", "macros", "rt"] }
tokio-util = { workspace = true }

# Crypto and security
aes-gcm = "0.10"
argon2 = "0.5"
base64 = { workspace = true }
domain-key = { workspace = true }
rand = { workspace = true }
sha2 = { workspace = true }
subtle = "2.6"
zeroize = { version = "1.8.2", features = ["zeroize_derive"] }

# Core types
nebula-core = { path = "../core" }
nebula-log = { path = "../log" }

# Parameter definitions
nebula-parameter = { path = "../parameter" }
nebula-eventbus = { path = "../eventbus" }

# Errors
nebula-error = { workspace = true }
thiserror = { workspace = true }

# HTTP client (for flows)
reqwest = { workspace = true, default-features = false, features = ["json", "rustls", "form"] }
url = { workspace = true }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

# Utilities
chrono = { workspace = true }
uuid = { workspace = true, features = ["v4", "serde"] }
tracing = { workspace = true }
humantime-serde = "1.1"
futures = { workspace = true }

# Caching
moka = { workspace = true, features = ["future"] }

# Synchronization
parking_lot = { workspace = true }

# Optional storage backends (Postgres via nebula-storage)
nebula-storage = { path = "../storage", optional = true }

# Storage backend dependencies
# Local storage
atomicwrites = "0.4"
fs2 = "0.4"
directories = "6.0"

# AWS Secrets Manager (optional)
aws-config = { version = "1.8", optional = true }
aws-sdk-secretsmanager = { version = "1.103", optional = true }

# HashiCorp Vault (optional)
vaultrs = { version = "0.8", optional = true }

# Kubernetes Secrets (optional)
kube = { version = "3.1", optional = true, features = ["runtime", "derive"] }
k8s-openapi = { version = "0.27.1", optional = true, features = ["latest", "schemars"] }
schemars = { version = "1", optional = true }

[target.'cfg(windows)'.dependencies]
windows-acl = "0.3"

[dev-dependencies]
tokio-test = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
testcontainers = "0.27.2"
testcontainers-modules = { version = "0.15", features = ["localstack", "hashicorp_vault", "k3s"] }
reqwest = { workspace = true }

[features]
default = ["storage-local"]
storage-local = []
storage-aws = ["aws-sdk-secretsmanager", "aws-config"]
storage-vault = ["vaultrs"]
storage-k8s = ["kube", "k8s-openapi", "schemars"]
storage-all = ["storage-aws", "storage-vault", "storage-k8s"]
storage-postgres = ["dep:nebula-storage", "nebula-storage/postgres"]
