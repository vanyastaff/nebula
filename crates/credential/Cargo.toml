[package]
name = "nebula-credential"
version.workspace = true
edition.workspace = true
keywords.workspace = true
authors.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
# Async
async-trait = { workspace = true }
# Tokio features (audited 2026-04-20, phase P3.1):
#   `time`   — tokio::time items used across the crate:
#              `timeout` in executor, resolver, refresh, rotation/validation;
#              `sleep` in oauth2/flow (device-code polling)
#   `sync`   — tokio::sync items used across the crate:
#              `RwLock` in store_memory, pending_store_memory (dual-home shim);
#              `Mutex` in resolver;
#              `oneshot` + `Semaphore` in refresh (RefreshCoordinator)
#   `macros` — #[tokio::test] (133 sites)
#   `rt`     — required by #[tokio::test] expansion and tokio::spawn in tests
tokio = { workspace = true, features = ["time", "sync", "macros", "rt"] }

# Crypto and security
aes-gcm = "0.10"
argon2 = "0.5"
base64 = { workspace = true }
rand = { workspace = true }
sha2 = { workspace = true }
zeroize = { version = "1.8.2", features = ["zeroize_derive"] }
subtle = { workspace = true }

# Core types
nebula-credential-macros = { path = "macros" }
nebula-core = { path = "../core" }
nebula-metadata = { path = "../metadata" }

# Typed identifiers (ULID-backed) — `CredentialId` is a prefixed ULID
# defined via `domain_key::define_ulid!` (metadata/id.rs).
domain-key = { workspace = true }

# Schema definitions
nebula-schema = { path = "../schema" }
nebula-eventbus = { path = "../eventbus" }

# Resilience (circuit breaker, retry)
nebula-resilience = { path = "../resilience" }

# Errors
nebula-error = { workspace = true }
thiserror = { workspace = true }

# HTTP client (for flows)
reqwest = { workspace = true, default-features = false, features = ["json", "rustls", "form"] }
url = { workspace = true }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

# Utilities
chrono = { workspace = true }
uuid = { workspace = true, features = ["v4", "serde"] }
tracing = { workspace = true }
humantime-serde = "1.1"

# Caching
lru = { workspace = true }

# Synchronization
arc-swap = { workspace = true }
parking_lot = { workspace = true }
scopeguard = "1"

[dev-dependencies]
reqwest = { workspace = true }
futures = { workspace = true }
base64 = { workspace = true }
tracing-subscriber = { workspace = true, features = ["fmt"] }
semver = { workspace = true }

[features]
default = []
rotation = []
# Expose test-only helpers (e.g. `StaticKeyProvider`) to integration tests and
# to other crates' dev-dependency paths. Must never be enabled in a production
# release build — see ADR-0023.
test-util = []

[lints]
workspace = true
