[package]
name = "nebula-credential"
version.workspace = true
edition.workspace = true
keywords.workspace = true
authors.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
# Async
async-trait = { workspace = true }
tokio = { workspace = true, features = ["time", "sync", "macros", "rt"] }
tokio-util = { workspace = true }

# Crypto and security
aes-gcm = "0.10"
argon2 = "0.5"
base64 = { workspace = true }
domain-key = { workspace = true }
rand = { workspace = true }
sha2 = { workspace = true }
subtle = "2.6"
zeroize = { version = "1.8.2", features = ["zeroize_derive"] }

# Core types
nebula-credential-macros = { path = "macros" }
nebula-core = { path = "../core" }
nebula-log = { path = "../log" }

# Parameter definitions
nebula-parameter = { path = "../parameter" }
nebula-eventbus = { path = "../eventbus" }

# Resilience (circuit breaker, retry)
nebula-resilience = { path = "../resilience" }

# Errors
nebula-error = { workspace = true }
thiserror = { workspace = true }

# HTTP client (for flows)
reqwest = { workspace = true, default-features = false, features = ["json", "rustls", "form"] }
url = { workspace = true }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

# Utilities
chrono = { workspace = true }
uuid = { workspace = true, features = ["v4", "serde"] }
tracing = { workspace = true }
humantime-serde = "1.1"
futures = { workspace = true }

# Caching
moka = { workspace = true, features = ["future"] }

# Synchronization
arc-swap = { workspace = true }
parking_lot = { workspace = true }
scopeguard = "1"

[dev-dependencies]
tokio-test = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
reqwest = { workspace = true }

[features]
default = []
rotation = []
