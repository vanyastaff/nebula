[package]
name = "nebula-credential"
version.workspace = true
edition.workspace = true
keywords.workspace = true
authors.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
# Async
async-trait = { workspace = true }
# Tokio features (audited 2026-04-20, phase P3.1; resolver/executor live in nebula-engine):
#   `time`   — `timeout` in rotation/error (validation);
#              device-code polling paths
#   `sync`   — `RwLock` in store_memory, pending_store_memory (cycle-safe shims)
#   `macros` — #[tokio::test] (133 sites)
#   `rt`     — required by #[tokio::test] expansion and tokio::spawn in tests
tokio = { workspace = true, features = ["time", "sync", "macros", "rt"] }
tokio-util = { workspace = true }

# Crypto and security
aes-gcm = "0.10"
argon2 = "0.5"
base64 = { workspace = true }
rand = { workspace = true }
sha2 = { workspace = true }
zeroize = { version = "1.8.2", features = ["zeroize_derive"] }
secrecy = { workspace = true }
subtle = { workspace = true }

# Core types
nebula-credential-macros = { path = "macros" }
nebula-core = { path = "../core" }
nebula-metadata = { path = "../metadata" }

# Schema definitions
nebula-schema = { path = "../schema" }

# Resilience (circuit breaker, retry)
nebula-resilience = { path = "../resilience" }

# Errors
nebula-error = { workspace = true }
thiserror = { workspace = true }
url = { workspace = true }
# RFC 3986 §3.2.1 userinfo encoding for ConnectionUri::as_url (§15.5 §3295)
percent-encoding = "2"

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

# Utilities
chrono = { workspace = true }
uuid = { workspace = true, features = ["v4", "serde"] }
tracing = { workspace = true }
humantime-serde = "1.1"
semver = { workspace = true }

# Synchronization
arc-swap = { workspace = true }

[dev-dependencies]
base64 = { workspace = true }
tokio = { workspace = true, features = ["io-util", "macros", "net", "rt", "rt-multi-thread"] }
tracing-subscriber = { workspace = true, features = ["fmt"] }
insta = { workspace = true }
mockall = { workspace = true }
pretty_assertions = { workspace = true }
rstest = { workspace = true }
trybuild = "1.0"

[features]
default = []
rotation = []
# Expose test-only helpers (e.g. `StaticKeyProvider`) to integration tests and
# to other crates' dev-dependency paths. Must never be enabled in a production
# release build — see ADR-0023.
test-util = []

[lints]
workspace = true
