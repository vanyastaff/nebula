[package]
name = "nebula-credential"
version.workspace = true
edition.workspace = true
keywords.workspace = true
authors.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
# Async
async-trait = { workspace = true }
tokio = { workspace = true, features = ["time", "sync", "macros", "rt"] }
tokio-util = { workspace = true }

# Crypto and security
aes-gcm = "0.10"
argon2 = "0.5"
base64 = { workspace = true }
rand = { workspace = true }
sha2 = { workspace = true }
zeroize = { version = "1.8.2", features = ["zeroize_derive"] }
subtle = { workspace = true }

# Core types
nebula-credential-macros = { path = "macros" }
nebula-core = { path = "../core" }
nebula-metadata = { path = "../metadata" }

# Schema definitions
nebula-schema = { path = "../schema" }
nebula-eventbus = { path = "../eventbus" }

# Resilience (circuit breaker, retry)
nebula-resilience = { path = "../resilience" }

# Metrics & telemetry
nebula-telemetry = { path = "../telemetry" }
nebula-metrics = { path = "../metrics" }

# Errors
nebula-error = { workspace = true }
thiserror = { workspace = true }

# HTTP client (for flows)
reqwest = { workspace = true, default-features = false, features = ["json", "rustls", "form"] }
url = { workspace = true }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

# Utilities
chrono = { workspace = true }
uuid = { workspace = true, features = ["v4", "serde"] }
tracing = { workspace = true }
humantime-serde = "1.1"

# Caching
lru = { workspace = true }
moka = { workspace = true, features = ["future"] }

# Synchronization
arc-swap = { workspace = true }
parking_lot = { workspace = true }
scopeguard = "1"

[dev-dependencies]
reqwest = { workspace = true }
futures = { workspace = true }
tracing-subscriber = { workspace = true, features = ["fmt"] }

[features]
default = []
rotation = []
