[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "workspace"
yanked = "deny"
ignore = [
    { id = "RUSTSEC-2023-0071", reason = "rsa pulled by jsonwebtoken rust_crypto feature; project uses HS256 only, RSA code path never reached" },
    { id = "RUSTSEC-2026-0097", reason = "rand 0.10.0 unsound only under custom panic-logger + thread-local interaction, not our usage pattern; patched release pending upstream" },
    { id = "RUSTSEC-2026-0098", reason = "webpki URI name-constraint handling is not used by Nebula; no URI SAN assertions are performed in current TLS paths" },
]

[licenses]
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "deny"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = [
    { crate = "openssl", reason = "Prefer rustls-based TLS stack across the workspace" },
    { crate = "nebula-api", wrappers = ["nebula-cli", "nebula-api"], reason = "API is top layer; lower-level crates must not depend on it directly" },
    { crate = "nebula-engine", wrappers = ["nebula-cli"], reason = "Engine is exec-layer orchestration; business/core crates must not depend on it" },
    { crate = "nebula-runtime", wrappers = ["nebula-engine", "nebula-api", "nebula-cli"], reason = "Runtime is exec-layer; only designated upper-layer crates may depend on it" },
    { crate = "nebula-sandbox", wrappers = ["nebula-runtime", "nebula-cli"], reason = "Sandbox is infra/exec boundary and should only be used through runtime-facing crates" },
]
skip = [
    "bitflags",
    "block-buffer",
    "const-oid",
    "cpufeatures",
    "crossterm",
    "crypto-common",
    "darling",
    "darling_core",
    "darling_macro",
    "digest",
    "foldhash",
    "getrandom",
    "hashbrown",
    "hmac",
    "linux-raw-sys",
    "rand",
    "rand_chacha",
    "rand_core",
    "rustix",
    "sha2",
    "thiserror",
    "thiserror-impl",
    "windows-sys",
    "windows-targets",
    "windows_aarch64_gnullvm",
    "windows_aarch64_msvc",
    "windows_i686_gnu",
    "windows_i686_gnullvm",
    "windows_i686_msvc",
    "windows_x86_64_gnu",
    "windows_x86_64_gnullvm",
    "windows_x86_64_msvc",
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
