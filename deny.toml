[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "workspace"
yanked = "deny"
ignore = [
  { id = "RUSTSEC-2023-0071", reason = "rsa pulled by jsonwebtoken rust_crypto feature; project uses HS256 only, RSA code path never reached" },
  { id = "RUSTSEC-2026-0097", reason = "rand 0.10.0 unsound only under custom panic-logger + thread-local interaction, not our usage pattern; patched release pending upstream" },
  { id = "RUSTSEC-2026-0098", reason = "webpki URI name-constraint handling is not used by Nebula; no URI SAN assertions are performed in current TLS paths" },
]

[licenses]
allow = [
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "deny"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = [
  { crate = "openssl", reason = "Prefer rustls-based TLS stack across the workspace" },

  # ---- Layer enforcement: API (top) ----
  # nebula-api may only be depended on by itself (dev-dep for test-util feature).
  # nebula-cli talks to the engine directly, not through the API crate.
  { crate = "nebula-api", wrappers = [
    "nebula-api",
  ], reason = "API is top layer; lower-level crates must not depend on it directly" },

  # ---- Layer enforcement: Exec ----
  { crate = "nebula-engine", wrappers = [
    "nebula-cli",
    # Dev-only: `crates/api/tests/knife.rs` wires the API + Engine composition
    # for the §13 knife integration test (ADR-0008 follow-up A2). A dedicated
    # `apps/server` composition root is still tracked as a separate follow-up;
    # until it exists this is the only place the two layers meet in-process.
    "nebula-api",
  ], reason = "Engine is exec-layer orchestration; business/core crates must not depend on it" },
  { crate = "nebula-sandbox", wrappers = [
    "nebula-engine",
    "nebula-cli",
  ], reason = "Sandbox is exec/infra boundary; only engine and CLI may depend on it directly" },
  { crate = "nebula-storage", wrappers = [
    "nebula-engine",
    "nebula-api",
  ], reason = "Storage is exec-layer; business and core crates must not depend on it directly" },
  { crate = "nebula-sdk", wrappers = [
    "nebula-examples",
  ], reason = "SDK is the external integration surface; only the examples workspace member may depend on it" },
  { crate = "nebula-plugin-sdk", wrappers = [
    "nebula-sandbox",
  ], reason = "Plugin-SDK is the out-of-process plugin protocol; only sandbox may depend on it" },
]
skip = [
  "bitflags",
  "block-buffer",
  "const-oid",
  "cpufeatures",
  "crossterm",
  "crypto-common",
  "darling",
  "darling_core",
  "darling_macro",
  "digest",
  "foldhash",
  "getrandom",
  "hashbrown",
  "hmac",
  "linux-raw-sys",
  "r-efi",
  "rand",
  "rand_chacha",
  "rand_core",
  "redox_syscall",
  "rustix",
  "sha2",
  "thiserror",
  "thiserror-impl",
  "windows-sys",
  "windows-targets",
  "windows_aarch64_gnullvm",
  "windows_aarch64_msvc",
  "windows_i686_gnu",
  "windows_i686_gnullvm",
  "windows_i686_msvc",
  "windows_x86_64_gnu",
  "windows_x86_64_gnullvm",
  "windows_x86_64_msvc",
]
skip-tree = [
  # figment 0.10 pins toml v0.8.x (with serde_spanned v0.6, toml_datetime v0.6,
  # winnow v0.7) while the rest of the workspace is on toml v1.x. Accept the
  # duplicate under figment only — the CLI is the sole consumer and the older
  # parser is lifetime-scoped to config loading.
  { crate = "figment@0.10", depth = 3 },
]

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
