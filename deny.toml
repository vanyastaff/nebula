  "block-buffer",
  "const-oid",
  "cpufeatures",
  "crossterm",
  "crypto-common",
  "darling",
  "darling_core",
  "darling_macro",
  "digest",
  "foldhash",
  "getrandom",
  "hashbrown",
  "hmac",
  "linux-raw-sys",
  "r-efi",
  "rand",
  "rand_chacha",
  "rand_core",
  "redox_syscall",
  "rustix",
  "sha2",
  "thiserror",
  "thiserror-impl",
  "windows-sys",
  "windows-targets",
  "windows_aarch64_gnullvm",
  "windows_aarch64_msvc",
  "windows_i686_gnu",
  "windows_i686_gnullvm",
  "windows_i686_msvc",
  "windows_x86_64_gnu",
  "windows_x86_64_gnullvm",
  "windows_x86_64_msvc",
]
skip-tree = [
