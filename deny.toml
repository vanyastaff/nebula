[graph]
targets = []
# `all-features = true` is mandatory: with `false`, opt-in features are
# resolved away before [bans] runs, which made the openssl ban below into
# theatre — `nebula-log/sentry` (opt-in) used to pull native-tls → openssl
# under the radar. Keep this `true` so any future opt-in feature path that
# activates a banned crate fails CI immediately, not after a Dependabot alert.
all-features = true
no-default-features = false

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "workspace"
yanked = "deny"
ignore = [
  { id = "RUSTSEC-2023-0071", reason = "rsa pulled by jsonwebtoken rust_crypto feature; project uses HS256 only, RSA code path never reached" },
  # RUSTSEC-2026-0097 / -0098 ignores were dropped 2026-04-28: rand bumped to
  # 0.10.1 (patched), webpki crate no longer in lock. Re-add only if regressions.
]

[licenses]
allow = [
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",             # xxhash-rust (transitive via redis 1.x → nebula-storage); permissive, ok for vendoring.
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false
registries = []

[bans]
# `warn`, not `deny`: with `[graph] all-features = true` the workspace exposes
# legitimate transitive duplicates we don't control (aws-sdk uses an older
# RustCrypto stack — p256, ecdsa, elliptic-curve, etc. — alongside
# jsonwebtoken's newer one; figment historically pinned older toml). Hard-
# denying these forced opt-out via skip lists that grew stale and hid the
# important signal. Keep duplicates as a noisy warning; the strict gate is the
# explicit `deny = [...]` list below (openssl, layer wrappers, etc.).
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = [
  { crate = "openssl", reason = "Prefer rustls-based TLS stack across the workspace" },

  # ---- Layer enforcement: API (top) ----
  # nebula-api may only be depended on by itself (dev-dep for test-util feature)
  # and by the apps/server composition root that wires the binary.
  # nebula-cli talks to the engine directly, not through the API crate.
  { crate = "nebula-api", wrappers = [
    "nebula-api",
    "nebula-server",
    # examples/ member hosts the api_simple_server startup demo.
    "nebula-examples",
  ], reason = "API is top layer; lower-level crates must not depend on it directly" },

  # ---- Layer enforcement: Exec ----
  { crate = "nebula-engine", wrappers = [
    "nebula-cli",
    # Dev-only: `crates/api/tests/knife.rs` wires the API + Engine composition
    # for the §13 knife integration test (ADR-0008 follow-up A2).
    "nebula-api",
    # nebula-credential-runtime is the Exec-tier owner of the credential
    # management bounded context; its build() composes the engine-owned
    # resolver + lease lifecycle internally. The edge is acyclic — engine
    # does NOT depend back on runtime (see docs/adr/0066).
    "nebula-credential-runtime",
  ], reason = "Engine is exec-layer orchestration; business/core crates must not depend on it" },
  # ---- Layer enforcement: Plugin-Proto (leaf tier) ----
  # nebula-sandbox is the duplex plugin transport. It is a leaf with no
  # Business/Exec dependency (Core + plugin-sdk + tokio/serde only), so
  # nebula-plugin (Business) -> nebula-sandbox is a legal *downward* edge.
  # The runner abstraction lives in nebula-engine; discovery + the
  # SandboxError->ActionError seam live in nebula-plugin.
  { crate = "nebula-sandbox", wrappers = [
    "nebula-engine",
    "nebula-plugin",
    "nebula-cli",
  ], reason = "Sandbox is the Plugin-Proto leaf transport; only engine (runner adapter), plugin (discovery + bridge), and CLI may depend on it directly" },
  { crate = "nebula-storage", wrappers = [
    "nebula-engine",
    "nebula-api",
    # apps/server composition root wires in-memory repos directly (default_state).
    "nebula-server",
    # Dev-only: `crates/credential-vault/tests/cache_integration.rs`
    # exercises `ProviderCacheLayer` over `VaultProvider` to prove the
    # cache/lease wiring from ADR-0051 Phase A composes with the Vault
    # backend introduced in Phase C. Same pattern as the engine dev-dep
    # carved out above for the §13 knife integration test.
    "nebula-credential-vault",
    # nebula-credential-runtime composes the storage-owned layered
    # CredentialStore stack (Audit/Cache/Encryption) inside build().
    "nebula-credential-runtime",
    # examples/ member hosts the api_simple_server startup demo which
    # wires in-memory repos directly (same pattern as nebula-server).
    "nebula-examples",
  ], reason = "Storage is exec-layer; business and core crates must not depend on it directly" },

  # nebula-storage-port is the Core-tier storage contract: object-safe
  # repository traits, port-local DTO rows, the plain-data `Scope` value
  # type, `StorageError`, and the `TransitionBatch` unit-of-work. Being a
  # Core-tier contract it is broadly importable: the adapter
  # (`nebula-storage`), the loom probe, the tenancy decorator, the
  # exec/api consumers, and the credential-vault dev-dep may depend on it
  # downward. It has no sqlx and no upward deps.
  { crate = "nebula-storage-port", wrappers = [
    "nebula-storage",
    "nebula-storage-loom-probe",
    "nebula-tenancy",
    "nebula-engine",
    "nebula-api",
    "nebula-credential-vault",
  ], reason = "Storage port is a Core-tier contract; the adapter, tenancy decorator, exec/api consumers, and the credential-vault dev-dep may depend on it" },

  # nebula-tenancy is the Business-tier multi-tenancy security boundary: it
  # owns the policy (resolve `Scope` from a `Principal`, inject it, enforce
  # cross-tenant denial) via scoping decorators over the storage port — it
  # never owns the `Scope` type itself (that is port/Core-level). Only the
  # composition roots may depend on it: the API `AppState` builds the
  # adapter and wraps it in the tenancy decorator from the request
  # principal; the engine receives only the already-scoped `Arc<dyn …>`
  # handle. The dev-dep entries carve out the scoped conformance matrix
  # (`crates/storage/tests/conformance`) and the §13 knife integration test
  # (`crates/api/tests/knife.rs` is in `nebula-api`). The allowlist locks
  # this set so a sibling Business/Core crate cannot quietly bypass the
  # boundary by depending on the decorator directly.
  { crate = "nebula-tenancy", wrappers = [
    "nebula-api",
    "nebula-engine",
    # Dev-only: the scoped variant of the storage conformance matrix wires
    # `nebula-tenancy` as a dev-dep to prove cross-tenant denial uniformly
    # across {InMemory, SQLite, Postgres} behind the decorator (spec §6.1).
    "nebula-storage",
  ], reason = "Tenancy is the Business-tier security boundary; only composition roots (api/engine) and the scoped-conformance dev-dep may depend on the decorator" },
  { crate = "nebula-sdk", wrappers = [
    "nebula-examples",
  ], reason = "SDK is the external integration surface; only the examples workspace member may depend on it" },
  { crate = "nebula-plugin-sdk", wrappers = [
    "nebula-sandbox",
    "nebula-plugin",
  ], reason = "Plugin-SDK is the out-of-process plugin protocol (Plugin-Proto tier); the sandbox transport and the plugin discovery path may depend on it" },

  # ---- Layer enforcement: Business / shared infra ----
  # nebula-resource is the runtime resource framework consumed by both business
  # (action) and exec (engine/sandbox/sdk/plugin) tiers. The allowlist locks the
  # current consumer set so a future PR cannot quietly introduce an upward
  # dependency from API or core/* without an explicit deny.toml change.
  # See `docs/adr/0044-supersede-0036-resource-credential-singular.md`
  # (R-040 / SF-1) for the rationale.
  { crate = "nebula-resource", wrappers = [
    "nebula-action",
    "nebula-engine",
    "nebula-examples",
    "nebula-plugin",
    "nebula-sdk",
  ], reason = "Resource framework is shared infra; only the listed business/exec consumers may depend on it (no upward deps from API or core/*); examples demonstrate Resource impls for Pool/Resident topologies (M6.3)" },

  # nebula-credential is the credential contract crate. It is shared infra
  # (not a single-tier Business crate): the Exec tier (engine/storage) and
  # the API tier consume it directly alongside the Business tier
  # (action/plugin/resource) and the first-party backends
  # (credential-builtin/-vault). The AGENTS.md layer map reflects this as a
  # shared-infra note rather than a Business row. The allowlist locks the
  # current consumer set so a future PR cannot introduce an unreviewed
  # upward dependency from core/*.
  { crate = "nebula-credential", wrappers = [
    "nebula-action",
    "nebula-api",
    "nebula-credential-builtin",
    # nebula-credential-runtime is the Exec-tier owner of the credential
    # management bounded context; it consumes the contract crate directly
    # (CredentialService facade + type registry + ops dispatch). See
    # docs/adr/0066.
    "nebula-credential-runtime",
    "nebula-credential-vault",
    "nebula-engine",
    "nebula-plugin",
    "nebula-resource",
    "nebula-sdk",
    "nebula-storage",
    # The credential scope-layer (the `CredentialStore` scope decorator
    # + its owner resolver) is re-homed into the tenancy security
    # boundary (spec §8); `nebula-tenancy` owns that policy half and
    # therefore consumes the credential contract directly. The
    # credential-specific Encryption/Cache/Audit wiring still lives in
    # `nebula-storage` and re-composes on top.
    "nebula-tenancy",
  ], reason = "Credential contract is shared infra; the listed Business/Exec/API consumers and first-party backends may depend on it (no upward deps from core/*)" },

  # nebula-expression is a Core-tier expression evaluator. The wrapper
  # allowlist locks the current consumer set so future PRs cannot quietly
  # introduce upward deps from API or sandbox/storage tiers without a
  # deliberate deny.toml change. ADR-0043 §9 / Phase 9 (R-040 R8): the
  # `nebula-resource → nebula-expression` edge is the JSON-driven config
  # path used by `Manager::register_from_value` to resolve `{{ }}` templates
  # in resource configs before schema validation.
  { crate = "nebula-expression", wrappers = [
    "nebula-schema",
    "nebula-resource",
    "nebula-engine",
    "nebula-examples",
    # Dev-only: action / engine integration tests bridge schema and
    # ExpressionContext through a real engine so Phase 9 pipeline probes
    # exercise the same evaluator the runtime uses.
    "nebula-action",
  ], reason = "ADR-0043 §9 / Phase 9: register_from_value bridges resource config to expression engine for {{ }} template resolution; schema uses it for parse validation; engine resolver evaluates node parameters; examples consume both" },

  # nebula-credential-builtin is a Business-tier crate that ships first-party
  # concrete credential types. Plugin authors depend on the contract crate
  # (`nebula-credential`), NOT on this one — see crate README and
  # `docs/INTEGRATION_MODEL.md` §2.4.
  # The wrappers allowlist is widened when a composition-root crate wires
  # the concrete types in via `register_builtins`. nebula-credential-runtime
  # is exactly that root (Exec-tier owner of the credential management
  # bounded context, docs/adr/0066). Upward deps from other Exec/API tier
  # crates (nebula-engine, -storage, -api, -resource, -action, -sandbox,
  # -plugin, -sdk) remain forbidden by the wrapper allowlists on each of
  # those crates, which deliberately omit nebula-credential-builtin.
  { crate = "nebula-credential-builtin", wrappers = [
    "nebula-credential-builtin",
    # The credential-runtime composition root calls
    # `nebula_credential_builtin::register_builtins` to populate the
    # CredentialRegistry/CredentialDispatch (docs/adr/0066).
    "nebula-credential-runtime",
  ], reason = "Built-in credential types are first-party; the credential-runtime composition root wires them via register_builtins (ADR-0066)" },

  # nebula-credential-vault is the first concrete LeasedProvider impl per
  # ADR-0051 Phase C — Business-tier backend wrapping the HashiCorp Vault
  # HTTP API (KV v2 + dynamic secrets). Plugin authors depend on the
  # contract crate (`nebula-credential`); composition roots wire this
  # backend in via `Arc<dyn ExternalProvider>` so it stays decoupled from
  # any specific Exec/API consumer. The wrapper allowlist starts empty
  # and is widened as composition roots adopt the provider.
  { crate = "nebula-credential-vault", wrappers = [
    "nebula-credential-vault",
  ], reason = "Vault is a first-party LeasedProvider backend (ADR-0051 Phase C); consumers wire it through their composition root, not via direct deps from upper tiers" },
  # nebula-credential-runtime is the Exec-tier owner of the credential
  # management bounded context (CredentialService facade + type registry +
  # state-source resolution + observability). Narrowly supersedes the
  # facade-ownership slice of ADR-0030 (see docs/adr/0066). The facade
  # lands here; only the API and CLI composition roots may depend on it.
  { crate = "nebula-credential-runtime", wrappers = [
    "nebula-credential-runtime",
    "nebula-api",
    "nebula-cli",
  ], reason = "Credential management runtime is Exec-tier; only the API and CLI composition roots may depend on it (ADR-0066)" },
]
skip = [
