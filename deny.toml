[graph]
targets = []
# `all-features = true` is mandatory: with `false`, opt-in features are
# resolved away before [bans] runs, which made the openssl ban below into
# theatre — `nebula-log/sentry` (opt-in) used to pull native-tls → openssl
# under the radar. Keep this `true` so any future opt-in feature path that
# activates a banned crate fails CI immediately, not after a Dependabot alert.
all-features = true
no-default-features = false

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "workspace"
yanked = "deny"
ignore = [
  { id = "RUSTSEC-2023-0071", reason = "rsa pulled by jsonwebtoken rust_crypto feature; project uses HS256 only, RSA code path never reached" },
  # RUSTSEC-2026-0097 / -0098 ignores were dropped 2026-04-28: rand bumped to
  # 0.10.1 (patched), webpki crate no longer in lock. Re-add only if regressions.
]

[licenses]
allow = [
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",             # xxhash-rust (transitive via redis 1.x → nebula-storage); permissive, ok for vendoring.
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false
registries = []

[bans]
# `warn`, not `deny`: with `[graph] all-features = true` the workspace exposes
# legitimate transitive duplicates we don't control (aws-sdk uses an older
# RustCrypto stack — p256, ecdsa, elliptic-curve, etc. — alongside
# jsonwebtoken's newer one; figment historically pinned older toml). Hard-
# denying these forced opt-out via skip lists that grew stale and hid the
# important signal. Keep duplicates as a noisy warning; the strict gate is the
# explicit `deny = [...]` list below (openssl, layer wrappers, etc.).
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = [
  { crate = "openssl", reason = "Prefer rustls-based TLS stack across the workspace" },

  # ---- Layer enforcement: API (top) ----
  # nebula-api may only be depended on by itself (dev-dep for test-util feature).
  # nebula-cli talks to the engine directly, not through the API crate.
  { crate = "nebula-api", wrappers = [
    "nebula-api",
  ], reason = "API is top layer; lower-level crates must not depend on it directly" },

  # ---- Layer enforcement: Exec ----
  { crate = "nebula-engine", wrappers = [
    "nebula-cli",
    # Dev-only: `crates/api/tests/knife.rs` wires the API + Engine composition
    # for the §13 knife integration test (ADR-0008 follow-up A2). A dedicated
    # `apps/server` composition root is still tracked as a separate follow-up;
    # until it exists this is the only place the two layers meet in-process.
    "nebula-api",
  ], reason = "Engine is exec-layer orchestration; business/core crates must not depend on it" },
  { crate = "nebula-sandbox", wrappers = [
    "nebula-engine",
    "nebula-cli",
  ], reason = "Sandbox is exec/infra boundary; only engine and CLI may depend on it directly" },
  { crate = "nebula-storage", wrappers = [
    "nebula-engine",
    "nebula-api",
  ], reason = "Storage is exec-layer; business and core crates must not depend on it directly" },
  { crate = "nebula-sdk", wrappers = [
    "nebula-examples",
  ], reason = "SDK is the external integration surface; only the examples workspace member may depend on it" },
  { crate = "nebula-plugin-sdk", wrappers = [
    "nebula-sandbox",
  ], reason = "Plugin-SDK is the out-of-process plugin protocol; only sandbox may depend on it" },

  # ---- Layer enforcement: Business / shared infra ----
  # nebula-resource is the runtime resource framework consumed by both business
  # (action) and exec (engine/sandbox/sdk/plugin) tiers. The allowlist locks the
  # current consumer set so a future PR cannot quietly introduce an upward
  # dependency from API or core/* without an explicit deny.toml change.
  # See `docs/superpowers/specs/2026-04-24-nebula-resource-redesign-summary.md`
  # (R-040 / SF-1) for the rationale.
  { crate = "nebula-resource", wrappers = [
    "nebula-action",
    "nebula-engine",
    "nebula-plugin",
    "nebula-sandbox",
    "nebula-sdk",
  ], reason = "Resource framework is shared infra; only the listed business/exec consumers may depend on it (no upward deps from API or core/*)" },

  # nebula-credential-builtin is a Business-tier crate that ships first-party
  # concrete credential types. Plugin authors depend on the contract crate
  # (`nebula-credential`), NOT on this one — see crate README and
  # `docs/superpowers/specs/2026-04-24-credential-redesign-strategy.md` §2.4.
  # П1 ships only the empty scaffold; the wrappers allowlist starts empty and
  # is widened in П3 when first-party concrete types land and composition
  # roots wire them in.
  # Allowed deps: nebula-credential, -macros, -core, -error, -schema (declared
  # in crates/credential-builtin/Cargo.toml). Upward deps on Exec/API tier
  # crates (nebula-engine, -storage, -api, -resource, -action, -runtime,
  # -sandbox, -plugin, -sdk) are forbidden by the wrapper allowlists on each
  # of those crates, which deliberately omit nebula-credential-builtin.
  { crate = "nebula-credential-builtin", wrappers = [
    "nebula-credential-builtin",
  ], reason = "Built-in credential types are a first-party scaffold; П1 has only the self-reference (the crate's own dev-deps), П3+ extends this allowlist with composition-root crates that wire concrete types" },
]
skip = [
  "bitflags",
  "block-buffer",
  "const-oid",
  "cpufeatures",
  "crossterm",
  "crypto-common",
  "darling",
  "darling_core",
  "darling_macro",
  "digest",
  "foldhash",
  "getrandom",
  "hashbrown",
  "hmac",
  "linux-raw-sys",
  "r-efi",
  "rand",
  "rand_chacha",
  "rand_core",
  "redox_syscall",
  "rustix",
  "sha2",
  "thiserror",
  "thiserror-impl",
  "windows-sys",
  "windows-targets",
  "windows_aarch64_gnullvm",
  "windows_aarch64_msvc",
  "windows_i686_gnu",
  "windows_i686_gnullvm",
  "windows_i686_msvc",
  "windows_x86_64_gnu",
  "windows_x86_64_gnullvm",
  "windows_x86_64_msvc",
]
skip-tree = [
] # figment@0.10 entry removed 2026-04-28 — figment is no longer in the resolved graph after the lockfile regenerate.

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
