# lefthook.yml
# Local git hooks. Pre-commit = fast, changed-crate scoped (fmt + clippy +
# typos/taplo/deny on staged files only) so a big refactor can land as small
# atomic commits without an as-yet-untouched crate going red (spec D3 / §7 F).
# Pre-push = full-workspace `clippy -D warnings` (CI clippy-job parity) plus
# the crate-diff nextest gate for the pending push range. Doctests / MSRV
# remain CI-owned; CI required jobs stay the authoritative final gate.

skip_output:
  - meta
  - summary
  - success
  - skips
  - execution_info
  - execution_out      # suppress stdout of green commands; failures still printed via execution_err

pre-commit:
  parallel: true
  commands:
    fmt-check:
      glob: "**/*.rs"
      # Per-crate to avoid Windows cmdline length limit (`cargo fmt --all`
      # iterates every workspace member and trips OS error 206 when the
      # working-tree path is deep, e.g. under `.worktrees/`). CI Linux still
      # runs `cargo fmt --all -- --check` as the authoritative gate.
      run: bash scripts/pre-commit-fmt-check.sh {staged_files}
    clippy:
      glob: "**/*.rs"
      # Changed-crate scoped (spec D3): the authoritative full-workspace
      # clippy moved to pre-push. Mirrors the per-crate fmt-check strategy.
      run: bash scripts/pre-commit-clippy-changed.sh {staged_files}
    typos:
      run: typos --quiet
    taplo:
      glob: "**/*.toml"
      env:
        RUST_LOG: "warn"
      run: taplo fmt --check
    cargo-deny:
      glob: "{Cargo.toml,Cargo.lock,deny.toml}"
      run: cargo deny --log-level error check 2>&1

commit-msg:
  commands:
    convco:
      run: cat {1} | convco check --from-stdin

pre-push:
  parallel: false
  commands:
    clippy-full:
      # Authoritative full-workspace clippy — CI `clippy` required-job
      # parity. Moved here from pre-commit (spec D3 / §7 F) so commits stay
      # changed-crate scoped; pre-push must mirror CI required jobs
      # (feedback_lefthook_mirrors_ci.md).
      run: cargo clippy --workspace --all-targets -- -D warnings
    crate-diff-gate:
      # Runs `cargo nextest run` for changed crates plus, when
      # `DATABASE_URL` is set, the `--features postgres` storage
      # integration tests (`pg_idempotency`, `execution_lease_pg_integration`,
      # `refresh_claim_pg_integration`). Skips with a single WARN line
      # when `DATABASE_URL` is unset (M2.2 / M3.4 contract — see
      # `feedback_lefthook_mirrors_ci.md`).
      run: bash scripts/pre-push-crate-diff.sh

# Doctests / docs / MSRV remain CI-owned checks.
# `cargo udeps` is NOT in pre-push — requires nightly and is slow; kept in
# the weekly CI workflow instead.
