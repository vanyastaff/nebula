skip_output:
  - meta
  - summary
  - success
  - skips
  - execution_info

pre-commit:
  parallel: true
  commands:
    fmt-check:
      run: cargo +nightly fmt --all -- --check
    clippy:
      run: cargo clippy --workspace --all-targets -q -- -D warnings
    cargo-check:
      run: cargo check --workspace --all-targets -q
    cargo-deny:
      glob: "{Cargo.toml,Cargo.lock,deny.toml,**/Cargo.toml}"
      run: cargo deny check

pre-push:
  parallel: false
  commands:
    nextest:
      run: cargo nextest run --workspace
    docs:
      env:
        RUSTDOCFLAGS: "-D warnings"
      run: cargo doc --workspace --no-deps --all-features -q
