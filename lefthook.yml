# lefthook.yml
# Local git hooks. Pre-commit = fast on changed files.
# Pre-push = fast gate that keeps push-time feedback under a few minutes.
# Full validation remains in CI required jobs.

skip_output:
  - meta
  - summary
  - success
  - skips
  - execution_info
  - execution_out      # suppress stdout of green commands; failures still printed via execution_err

pre-commit:
  parallel: true
  commands:
    fmt-check:
      glob: "*.rs"
      run: cargo +nightly fmt --all -- --check
    clippy:
      glob: "*.rs"
      run: cargo clippy --workspace --all-targets -q -- -D warnings
    typos:
      run: typos --quiet
    taplo:
      glob: "**/*.toml"
      env:
        RUST_LOG: "warn"
      run: taplo fmt --check
    cargo-deny:
      glob: "{Cargo.toml,Cargo.lock,deny.toml}"
      run: cargo deny --log-level error check 2>&1

commit-msg:
  commands:
    convco:
      run: cat {1} | convco check --from-stdin

pre-push:
  parallel: true
  commands:
    nextest-smoke:
      run: cargo nextest run -p nebula-core -p nebula-engine -p nebula-runtime --profile agent
    check-all-features:
      run: cargo check --workspace --all-features --all-targets --quiet
    check-no-default:
      run: |
        cargo check -p nebula-resilience --no-default-features --quiet
        cargo check -p nebula-log --no-default-features --quiet
        cargo check -p nebula-expression --no-default-features --quiet
    # Doctests/docs/MSRV are CI-owned checks. Keeping them out of pre-push
    # materially shortens local push feedback loop on Windows.
# Note: 'cargo udeps' is NOT in pre-push. It requires nightly + is slow. Kept in weekly CI workflow.

