# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
tone_instructions: >-
  Deep, high-signal reviews for a Rust workflow engine. Prioritize correctness,
  safety (data loss, concurrency races, lock ordering), API contract breakage,
  silent fallbacks, and missing regression tests. Be terse. Skip style nits.

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  review_status: true
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: true

  auto_review:
    enabled: true
    drafts: true
    incremental_reviews: true
    base_branches:
      - "main"
      - "release/.*"
    labels:
      - "!skip-coderabbit"
    description_keyword: "@coderabbit review"

  path_filters:
    - "!**/.claude/worktrees/**"
    - "!docs/plans/archive/**"
    - "!target/**"

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  learnings:
    scope: "auto"
  issues:
    enabled: true
  pull_requests:
    enabled: true
  linear:
    enabled: true

