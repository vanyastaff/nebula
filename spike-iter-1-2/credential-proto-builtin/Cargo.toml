[package]
name = "credential-proto-builtin"
version = "0.0.0-spike"
edition = "2024"
publish = false
# Disable example auto-discovery so the `compile_fail_*` examples (which are
# intentionally broken) don't break `cargo build`. They are built explicitly
# by `cargo build --example NAME` to verify §3.3 semantic failures.
autoexamples = false

# Standalone workspace (see ../credential-proto/Cargo.toml for rationale).
[workspace]

[[example]]
name = "compile_fail_app_password_is_not_bearer"
path = "examples/compile_fail_app_password_is_not_bearer.rs"

[[example]]
name = "compile_fail_app_password_via_phantom"
path = "examples/compile_fail_app_password_via_phantom.rs"

[[example]]
name = "compile_fail_external_forge"
path = "examples/compile_fail_external_forge.rs"

[[example]]
name = "compile_fail_app_password_to_bearer_projection"
path = "examples/compile_fail_app_password_to_bearer_projection.rs"

[[example]]
name = "compile_fail_dualauth_wrong_scheme"
path = "examples/compile_fail_dualauth_wrong_scheme.rs"

[[example]]
name = "compile_fail_zero_slot_credential_shorthand"
path = "examples/compile_fail_zero_slot_credential_shorthand.rs"

[[example]]
name = "compile_fail_two_slot_credential_shorthand"
path = "examples/compile_fail_two_slot_credential_shorthand.rs"

[dependencies]
credential-proto = { path = "../credential-proto" }

[dev-dependencies]
# Criterion for perf benches. 0.5 is the current mainline.
criterion = { version = "0.5", default-features = false, features = ["html_reports"] }
# ahash needed directly in benches for baseline construction parity with
# the registry's internal hasher.
ahash = { version = "0.8", default-features = false, features = ["std"] }

[[bench]]
name = "bench_baseline"
harness = false

[[bench]]
name = "bench_h1"
harness = false

[[bench]]
name = "bench_h2"
harness = false

[[bench]]
name = "bench_h3"
harness = false

[lints.clippy]
needless_lifetimes = "allow"
