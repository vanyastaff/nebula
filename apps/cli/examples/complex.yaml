# Complex workflow demonstrating:
# - Diamond pattern (fork + join)
# - Multiple action types
# - Error routing
# - Parallel execution
#
#   [start] ──┬── [process-a] ──┬── [join] ── [log-result]
#             └── [process-b] ──┘
#                     └── [error-handler] (on error)

id: "b0b0b0b0-1111-2222-3333-444444444444"
name: "Diamond Pipeline with Error Handling"
description: "Fork-join pattern: start splits into two parallel branches that merge"
version:
  major: 1
  minor: 0
  patch: 0
schema_version: 1
owner_id: "660e8400-e29b-41d4-a716-446655440099"
created_at: "2026-04-08T00:00:00Z"
updated_at: "2026-04-08T00:00:00Z"

nodes:
  # Entry point — receives the initial input
  - id: "00000000-0000-0000-0000-000000000001"
    name: "Start"
    action_key: "echo"
    parameters: {}

  # Branch A — adds processing metadata
  - id: "00000000-0000-0000-0000-00000000000a"
    name: "Process A"
    action_key: "echo"
    parameters: {}

  # Branch B — delays to simulate slow work
  - id: "00000000-0000-0000-0000-00000000000b"
    name: "Process B (slow)"
    action_key: "delay"
    parameters:
      ms:
        type: "literal"
        value: 50

  # Join — merges outputs from both branches
  - id: "00000000-0000-0000-0000-000000000002"
    name: "Join Results"
    action_key: "echo"
    parameters: {}

  # Final — logs and outputs
  - id: "00000000-0000-0000-0000-000000000003"
    name: "Final Output"
    action_key: "log"
    parameters: {}

  # Error handler — catches failures from Process B
  - id: "00000000-0000-0000-0000-0000000000ee"
    name: "Error Handler"
    action_key: "echo"
    parameters: {}

connections:
  # Fork: start → A, start → B
  - from_node: "00000000-0000-0000-0000-000000000001"
    to_node: "00000000-0000-0000-0000-00000000000a"
  - from_node: "00000000-0000-0000-0000-000000000001"
    to_node: "00000000-0000-0000-0000-00000000000b"

  # Join: A → join, B → join
  - from_node: "00000000-0000-0000-0000-00000000000a"
    to_node: "00000000-0000-0000-0000-000000000002"
  - from_node: "00000000-0000-0000-0000-00000000000b"
    to_node: "00000000-0000-0000-0000-000000000002"

  # join → final
  - from_node: "00000000-0000-0000-0000-000000000002"
    to_node: "00000000-0000-0000-0000-000000000003"

  # Error route: B errors → error handler
  - from_node: "00000000-0000-0000-0000-00000000000b"
    to_node: "00000000-0000-0000-0000-0000000000ee"
    condition:
      type: on_error
      matcher:
        type: any

config:
  error_strategy: "continue_on_error"
