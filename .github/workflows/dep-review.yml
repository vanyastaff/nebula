name: Dependency Review

# PR-time advisory diff for incoming dependency changes. Catches new
# vulnerable / disallowed-licence crates before merge — complements the
# weekly `security-audit.yml` (which scans `Cargo.lock` HEAD on `main`)
# and `ci.yml`'s `cargo deny` (which enforces `deny.toml` rules workspace-wide).
#
# Scope: PR diff only, hence light-weight — no full `cargo` install needed.

on:
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/dep-review.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Review dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          # Match the severity floor used by `cargo audit` so this stays
          # advisory-aligned with the weekly job. Bump to `low` once the
          # workflow has been live for a release cycle without false-positive
          # noise (advisory-DB churn for transitive deps is the usual cause).
          fail-on-severity: moderate
          # Mirrors the `[licenses].allow` set in `deny.toml`. Keep both lists
          # aligned — divergence means the same PR can pass dep-review but
          # fail `cargo deny` (or vice versa) and confuse contributors.
          # `0BSD` admits `quoted_printable` (transitive via `lettre` → nebula-server);
          # OSI-approved, strictly more permissive than MIT (no attribution clause).
          allow-licenses: 0BSD, Apache-2.0, BSD-2-Clause, BSD-3-Clause, CC0-1.0, CDLA-Permissive-2.0, ISC, MIT, MPL-2.0, Unicode-3.0, Unicode-DFS-2016, Zlib
          # Per-package license exemptions for crates whose `license` field uses
          # the deprecated `/` SPDX conjunction (e.g. `MIT/Apache-2.0`,
          # `BSD-3-Clause/MIT`). GitHub's parser cannot normalise `/` and renders
          # it as `LicenseRef-bad-…`, failing the allow-list match even though
          # every disjunct IS allowed above. `cargo deny` (the authoritative gate)
          # parses `/` as OR and passes. Exemptions are version-agnostic so a
          # patch bump does not re-trip the check.
          allow-dependencies-licenses: >-
            pkg:cargo/brotli-decompressor,
            pkg:cargo/futures-timer,
            pkg:cargo/generator
          comment-summary-in-pr: on-failure
