name: Test Matrix

on:
  workflow_dispatch:

jobs:
  test-crates:
    name: Test ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - nebula-core
          - nebula-log
          - nebula-action
          - nebula-expression
          - nebula-credential
          - nebula-config
          - nebula-storage
          - nebula-engine
          - nebula-runtime
          - nebula-resource
          - nebula-memory
          - nebula-system
          - nebula-validator
          - nebula-telemetry
          - nebula-parameter
          - nebula-workflow
          - nebula-api
          - nebula-app
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests for ${{ matrix.package }}
        run: cargo test -p ${{ matrix.package }} --all-features

