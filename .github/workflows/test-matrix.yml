name: Test Matrix

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  select-matrix:
    name: Select Matrix Scope
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.select.outputs.packages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select packages to test
        id: select
        shell: bash
        run: |
          set -euo pipefail

          FULL='["nebula-action","nebula-api","nebula-core","nebula-credential","nebula-engine","nebula-error","nebula-eventbus","nebula-execution","nebula-expression","nebula-log","nebula-metrics","nebula-plugin","nebula-resilience","nebula-resource","nebula-runtime","nebula-schema","nebula-sdk","nebula-storage","nebula-system","nebula-telemetry","nebula-validator","nebula-workflow"]'
          SMOKE='["nebula-core","nebula-engine","nebula-runtime"]'

          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "packages=$FULL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)

          if [[ -z "$CHANGED_FILES" ]]; then
            echo "packages=$SMOKE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t PACKAGES < <(
            echo "$CHANGED_FILES" \
              | sed -n 's#^crates/\([^/]*\)/.*#\1#p' \
              | sort -u \
              | while IFS= read -r crate; do
                  if [[ -d "crates/$crate" ]]; then
                    echo "nebula-$crate"
                  fi
                done
          )

          if [[ ${#PACKAGES[@]} -eq 0 ]]; then
            echo "packages=$SMOKE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          JSON=$(printf '%s\n' "${PACKAGES[@]}" | jq -R . | jq -s -c .)
          echo "packages=$JSON" >> "$GITHUB_OUTPUT"

  # Build workspace once and save cache — matrix jobs read it
  warm-cache:
    name: Warm Cache
    needs: select-matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: matrix
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Build workspace (populates cache)
        run: cargo check --workspace --all-targets

  test-crates:
    name: Test ${{ matrix.package }}
    needs: [select-matrix, warm-cache]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        package: ${{ fromJson(needs.select-matrix.outputs.packages) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: matrix
          save-if: false
          cache-on-failure: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Run tests for ${{ matrix.package }}
        run: cargo nextest run -p ${{ matrix.package }} --profile ci --no-tests=pass

      - name: Test summary
        if: always()
        uses: test-summary/action@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          paths: target/nextest/ci/junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.package }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
          retention-days: 3

  # Aggregator that branch protection's required `Tests` check points at.
  # Without this, the dynamic matrix job names (`Test nebula-core`, ...)
  # never satisfy the single required-check name, leaving PRs stuck on
  # "Tests — Expected — Waiting for status to be reported".
  tests:
    name: Tests
    needs: [select-matrix, warm-cache, test-crates]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate matrix results
        run: |
          set -euo pipefail
          fail=0
          for job in select-matrix warm-cache test-crates; do
            case "$job" in
              select-matrix) result="${{ needs.select-matrix.result }}" ;;
              warm-cache)    result="${{ needs.warm-cache.result }}" ;;
              test-crates)   result="${{ needs.test-crates.result }}" ;;
            esac
            if [[ "$result" != "success" ]]; then
              echo "::error::$job result: $result"
              fail=1
            fi
          done
          if [[ "$fail" -eq 1 ]]; then
            exit 1
          fi
          echo "All upstream jobs passed."

