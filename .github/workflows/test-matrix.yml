name: Test Matrix

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "vision/**"
      - ".ai-factory/**"
      - ".agents/**"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "vision/**"
      - ".ai-factory/**"
      - ".agents/**"
      - "LICENSE"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  select-matrix:
    name: Select Matrix Scope
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.select.outputs.packages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select packages to test
        id: select
        shell: bash
        run: |
          set -euo pipefail

          FULL='["nebula-action","nebula-api","nebula-auth","nebula-config","nebula-core","nebula-credential","nebula-engine","nebula-eventbus","nebula-execution","nebula-expression","nebula-log","nebula-macros","nebula-memory","nebula-metrics","nebula-parameter","nebula-plugin","nebula-resilience","nebula-resource","nebula-runtime","nebula-sdk","nebula-storage","nebula-system","nebula-telemetry","nebula-validator","nebula-webhook","nebula-workflow"]'
          SMOKE='["nebula-core","nebula-engine","nebula-runtime"]'

          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "packages=$FULL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)

          if [[ -z "$CHANGED_FILES" ]]; then
            echo "packages=$SMOKE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t PACKAGES < <(
            echo "$CHANGED_FILES" \
              | sed -n 's#^crates/\([^/]*\)/.*#nebula-\1#p' \
              | sort -u
          )

          if [[ ${#PACKAGES[@]} -eq 0 ]]; then
            echo "packages=$SMOKE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          JSON=$(printf '%s\n' "${PACKAGES[@]}" | jq -R . | jq -s -c .)
          echo "packages=$JSON" >> "$GITHUB_OUTPUT"

  test-crates:
    name: Test ${{ matrix.package }}
    needs: select-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: ${{ github.event_name == 'pull_request' }}
      max-parallel: 8
      matrix:
        package: ${{ fromJson(needs.select-matrix.outputs.packages) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Run tests for ${{ matrix.package }}
        run: cargo nextest run -p ${{ matrix.package }} --all-features --profile ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.package }}
          path: target/nextest/ci/junit.xml
          retention-days: 14

