name: Test Matrix

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE*"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - ".vscode/**"
      - ".idea/**"
      - ".claude/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/labeler.yml"
      - ".github/dependabot.yml"
      - "CODEOWNERS"
      - "assets/**"
      - "**.png"
      - "**.jpg"
      - "**.svg"
  # No `paths-ignore` on `pull_request`: `Tests` is a required check and
  # would stick in "waiting" on doc-only PRs if the workflow never fires.
  # Diff-scope already shrinks matrix to SMOKE when no crates changed — cost
  # is bounded (~3 crates × 1 runner). `push:` keeps paths-ignore.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  select-matrix:
    name: Select Matrix Scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      packages: ${{ steps.select.outputs.packages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Select packages to test
        id: select
        shell: bash
        run: |
          set -euo pipefail

          FULL='["nebula-action","nebula-api","nebula-core","nebula-credential","nebula-engine","nebula-error","nebula-eventbus","nebula-execution","nebula-expression","nebula-log","nebula-metrics","nebula-plugin","nebula-resilience","nebula-resource","nebula-schema","nebula-sdk","nebula-storage","nebula-telemetry","nebula-validator","nebula-workflow"]'
          SMOKE='["nebula-core","nebula-engine"]'

          EVENT="${{ github.event_name }}"
          if [[ "$EVENT" == "push" || "$EVENT" == "workflow_dispatch" ]]; then
            echo "packages=$FULL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE_SHA=""
          HEAD_SHA=""
          if [[ "$EVENT" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          elif [[ "$EVENT" == "merge_group" ]]; then
            BASE_SHA="${{ github.event.merge_group.base_sha }}"
            HEAD_SHA="${{ github.event.merge_group.head_sha }}"
          fi

          # Fail-safe: if event payload does not provide diff SHAs, run full set
          # rather than silently downgrading to smoke coverage.
          if [[ -z "$BASE_SHA" || -z "$HEAD_SHA" ]]; then
            echo "packages=$FULL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)

          if [[ -z "$CHANGED_FILES" ]]; then
            echo "packages=$SMOKE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t PACKAGES < <(
            echo "$CHANGED_FILES" \
              | sed -n 's#^crates/\([^/]*\)/.*#\1#p' \
              | sort -u \
              | while IFS= read -r crate; do
                  if [[ -d "crates/$crate" ]]; then
                    echo "nebula-$crate"
                  fi
                done
          )

          if [[ ${#PACKAGES[@]} -eq 0 ]]; then
            echo "packages=$SMOKE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          JSON=$(printf '%s\n' "${PACKAGES[@]}" | jq -R . | jq -s -c .)
          echo "packages=$JSON" >> "$GITHUB_OUTPUT"

  # Build workspace once and save cache — matrix jobs read it
  warm-cache:
    name: Warm Cache
    needs: select-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.9.1
        with:
          shared-key: matrix
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Build workspace (populates cache)
        run: cargo check --workspace --all-targets

  test-crates:
    name: Test ${{ matrix.package }}
    needs: [select-matrix, warm-cache]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        package: ${{ fromJson(needs.select-matrix.outputs.packages) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.9.1
        with:
          shared-key: matrix
          save-if: false
          cache-on-failure: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: cargo-nextest

      # - `nebula-engine`: OAuth2 rotation tests live behind `rotation`; parser
      #   integration tests use `test-util` to avoid weakening endpoint validation.
      #   We enable explicit features rather than `--all-features` because the
      #   latter also turns on `chaos-full`, which defeats the
      #   `cfg_attr(not(feature = "chaos-full"), ignore)` gate on
      #   `refresh_coordinator_chaos::three_replicas_zero_double_idp_calls` and
      #   makes that ~6s + watchdog test run on every PR (it has its own
      #   `nightly-chaos.yml` job).
      # - `nebula-storage`: `EncryptionLayer` + `KeyProvider` unit tests (incl. OAuth at-rest) need `test-util`.
      # Note: `nebula-api`'s `credential-oauth` feature was deleted 2026-04-24 —
      # OAuth ceremony now ships unconditionally per ADR-0031 §6.
      - name: Run tests for ${{ matrix.package }}
        run: |
          set -euo pipefail
          if [[ "${{ matrix.package }}" == "nebula-engine" ]]; then
            cargo nextest run -p nebula-engine --features "rotation,test-util" --profile ci --no-tests=pass
          elif [[ "${{ matrix.package }}" == "nebula-storage" ]]; then
            cargo nextest run -p nebula-storage --features "test-util,credential-in-memory" --profile ci --no-tests=pass
          else
            cargo nextest run -p "${{ matrix.package }}" --profile ci --no-tests=pass
          fi

      - name: Test summary
        if: always()
        uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          paths: target/nextest/ci/junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results-${{ matrix.package }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
          retention-days: 3

  # Aggregator that branch protection's required `Tests` check points at.
  # Without this, the dynamic matrix job names (`Test nebula-core`, ...)
  # never satisfy the single required-check name, leaving PRs stuck on
  # "Tests — Expected — Waiting for status to be reported".
  tests:
    name: Tests
    needs: [select-matrix, warm-cache, test-crates]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Aggregate matrix results
        run: |
          set -euo pipefail
          fail=0
          for job in select-matrix warm-cache test-crates; do
            case "$job" in
              select-matrix) result="${{ needs.select-matrix.result }}" ;;
              warm-cache)    result="${{ needs.warm-cache.result }}" ;;
              test-crates)   result="${{ needs.test-crates.result }}" ;;
            esac
            if [[ "$result" != "success" ]]; then
              echo "::error::$job result: $result"
              fail=1
            fi
          done
          if [[ "$fail" -eq 1 ]]; then
            exit 1
          fi
          echo "All upstream jobs passed."
