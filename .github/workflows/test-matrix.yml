name: Test Matrix

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test-crates:
    name: Test ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - nebula-action
          - nebula-api
          - nebula-auth
          - nebula-config
          - nebula-core
          - nebula-credential
          - nebula-engine
          - nebula-eventbus
          - nebula-execution
          - nebula-expression
          - nebula-log
          - nebula-macros
          - nebula-memory
          - nebula-metrics
          - nebula-parameter
          - nebula-plugin
          - nebula-resilience
          - nebula-resource
          - nebula-runtime
          - nebula-sdk
          - nebula-storage
          - nebula-system
          - nebula-telemetry
          - nebula-validator
          - nebula-webhook
          - nebula-workflow
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Run tests for ${{ matrix.package }}
        run: cargo nextest run -p ${{ matrix.package }} --all-features

