name: Test Matrix

on:
  push:
    branches: [main]
  # Pull requests always run because `Tests` is a required check. Pushes also
  # always reach this workflow: event-level path filters must not bypass the
  # sole package selector. The selector emits an empty matrix only for
  # repository-level, unowned docs/assets diffs; package-local docs/assets
  # still select their owner and reverse dependents.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  select-matrix:
    name: Select Matrix Scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.select.outputs.matrix }}
      count: ${{ steps.select.outputs.count }}
      storage_selected: ${{ steps.select.outputs.storage_selected }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.96.1

      - name: Select packages to test
        id: select
        shell: bash
        env:
          EVENT: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MG_BASE_SHA: ${{ github.event.merge_group.base_sha }}
          MG_HEAD_SHA: ${{ github.event.merge_group.head_sha }}
        run: |
          set -euo pipefail

          plan_args=(ci-plan full)
          if [[ "$EVENT" == "pull_request" ]]; then
            plan_args=(
              ci-plan diff
              --base "$PR_BASE_SHA"
              --head "$PR_HEAD_SHA"
              --comparison merge-base
            )
          elif [[ "$EVENT" == "merge_group" ]]; then
            plan_args=(
              ci-plan diff
              --base "$MG_BASE_SHA"
              --head "$MG_HEAD_SHA"
              --comparison direct
            )
          fi

          plan_file="$RUNNER_TEMP/nebula-ci-plan.json"
          cargo xtask "${plan_args[@]}" > "$plan_file"

          bytes=$(wc -c < "$plan_file")
          if (( bytes > 460800 )); then
            echo "::error::CI plan exceeds the conservative 450 KiB output limit"
            exit 1
          fi

          jq -e '
            ((keys | sort) == ["count", "include", "reason", "schema_version", "scope"]) and
            (.schema_version == 1) and
            (.scope == "full" or .scope == "diff") and
            ((.reason | type) == "string") and
            ((.count | type) == "number") and
            (.count >= 0 and .count <= 256 and .count == (.count | floor)) and
            ((.include | type) == "array") and
            (.count == (.include | length)) and
            ([.include[].package] == ([.include[].package] | sort | unique)) and
            all(.include[];
              ((keys | sort) == ["package", "test_features"]) and
              ((.package | type) == "string") and
              (.package | length) > 0 and
              ((.test_features | type) == "array") and
              (.test_features == (.test_features | sort | unique)) and
              all(.test_features[]; type == "string")
            )
          ' "$plan_file" > /dev/null

          matrix=$(jq -c '{include: .include}' "$plan_file")
          count=$(jq -r '.count' "$plan_file")
          storage_selected=$(jq -r 'any(.include[]; .package == "nebula-storage")' "$plan_file")
          {
            echo "matrix=$matrix"
            echo "count=$count"
            echo "storage_selected=$storage_selected"
          } >> "$GITHUB_OUTPUT"

  test-crates:
    name: Test ${{ matrix.package }}
    needs: [select-matrix]
    if: needs.select-matrix.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJSON(needs.select-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.96.1

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@8cbdedb5103daa674dcf46d3590fe06a76645684 # v2.9.1
        with:
          key: ${{ matrix.package }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@481c34c1cf3a84c68b5e46f4eccfc82af798415a # v2.75.23
        with:
          tool: cargo-nextest

      - name: Run tests for ${{ matrix.package }}
        shell: bash
        env:
          PKG: ${{ matrix.package }}
          TEST_FEATURES: ${{ join(matrix.test_features, ',') }}
        run: |
          set -euo pipefail
          command=(cargo nextest run -p "$PKG")
          if [[ -n "$TEST_FEATURES" ]]; then
            command+=(--features "$TEST_FEATURES")
          fi
          command+=(--profile ci --no-tests=pass)
          "${command[@]}"

      - name: Test summary
        if: always()
        uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86 # v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          paths: target/nextest/ci/junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results-${{ matrix.package }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
          retention-days: 3

  postgres-authority:
    name: PostgreSQL authority invariants
    needs: [select-matrix]
    if: needs.select-matrix.outputs.storage_selected == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/nebula_test?sslmode=disable
      NEBULA_REQUIRE_POSTGRES: "1"
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nebula_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nebula_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.96.1

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@8cbdedb5103daa674dcf46d3590fe06a76645684 # v2.9.1
        with:
          key: nebula-storage-postgres-authority
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@481c34c1cf3a84c68b5e46f4eccfc82af798415a # v2.75.23
        with:
          tool: cargo-nextest

      - name: Run real PostgreSQL authority tests
        shell: bash
        run: >-
          cargo nextest run
          -p nebula-storage
          --features postgres
          --profile ci
          --no-tests=fail
          -E 'package(=nebula-storage) & binary(=nebula_storage) & test(/pg::(oauth_state::tests|identity_secret::postgres_tests|session::tests|mfa_enrollment::tests)::/)'

      - name: Test summary
        if: always()
        uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86 # v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          paths: target/nextest/ci/junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results-nebula-storage-postgres-authority
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
          retention-days: 3

  # Branch protection points at this stable required check.
  tests:
    name: Tests
    needs: [select-matrix, test-crates, postgres-authority]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Aggregate matrix results
        shell: bash
        env:
          SELECT_RESULT: ${{ needs.select-matrix.result }}
          TEST_RESULT: ${{ needs.test-crates.result }}
          SELECTED_COUNT: ${{ needs.select-matrix.outputs.count }}
          STORAGE_SELECTED: ${{ needs.select-matrix.outputs.storage_selected }}
          POSTGRES_AUTHORITY_RESULT: ${{ needs.postgres-authority.result }}
        run: |
          set -euo pipefail

          if [[ "$SELECT_RESULT" != "success" ]]; then
            echo "::error::select-matrix result: $SELECT_RESULT"
            exit 1
          fi
          if [[ ! "$SELECTED_COUNT" =~ ^[0-9]+$ ]]; then
            echo "::error::select-matrix emitted invalid count: $SELECTED_COUNT"
            exit 1
          fi
          if [[ "$STORAGE_SELECTED" != "true" && "$STORAGE_SELECTED" != "false" ]]; then
            echo "::error::select-matrix emitted invalid storage-selected: $STORAGE_SELECTED"
            exit 1
          fi
          if [[ "$STORAGE_SELECTED" == "true" ]]; then
            if [[ "$POSTGRES_AUTHORITY_RESULT" != "success" ]]; then
              echo "::error::postgres-authority result: $POSTGRES_AUTHORITY_RESULT"
              exit 1
            fi
          elif [[ "$POSTGRES_AUTHORITY_RESULT" != "skipped" ]]; then
            echo "::error::postgres-authority must be skipped when storage is not selected; got $POSTGRES_AUTHORITY_RESULT"
            exit 1
          fi
          if [[ "$SELECTED_COUNT" == "0" ]]; then
            if [[ "$TEST_RESULT" != "skipped" ]]; then
              echo "::error::test-crates must be skipped for an empty matrix; got $TEST_RESULT"
              exit 1
            fi
            echo "No package tests were required for this diff."
          elif [[ "$TEST_RESULT" != "success" ]]; then
            echo "::error::test-crates result: $TEST_RESULT"
            exit 1
          else
            echo "All selected package tests passed."
          fi
