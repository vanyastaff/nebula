name: SemVer Checks

on:
  pull_request:
    paths:
      - "crates/**/Cargo.toml"
      - "crates/**/src/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  semver:
    name: cargo-semver-checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Advisory only during alpha — does not block merge.
    # Make this `required: true` in branch protection when leaving alpha.
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: cargo-semver-checks
      - name: Run cargo-semver-checks (advisory, skip if unpublished)
        run: |
          set +e
          cargo semver-checks check-release --workspace 2>&1 | tee semver-output.log
          exit_code=${PIPESTATUS[0]}
          # Graceful skip: if crates aren't published yet, this is expected in alpha.
          if grep -qE "not found in registry|no such crate" semver-output.log 2>/dev/null; then
            echo "::warning::Some crates not yet published — semver check skipped (alpha)"
            exit 0
          fi
          exit $exit_code
