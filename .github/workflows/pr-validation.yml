name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-metadata:
    name: Validate PR metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.action != 'edited' || github.event.changes.title != null
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install convco
        if: github.actor != 'dependabot[bot]'
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: convco

      - name: Check commit messages
        if: github.actor != 'dependabot[bot]'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: convco check "$BASE_SHA..$HEAD_SHA"

      - name: Check PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$TITLE" | grep -qP '^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?!?: .+'; then
            echo "::error::PR title must follow conventional commits: type(scope)!: description"
            echo "  Got: $TITLE"
            exit 1
          fi

      - name: Auto label PR
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6
        with:
          repo-token: '${{ secrets.GITHUB_TOKEN }}'

