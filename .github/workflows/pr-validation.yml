name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-metadata:
    name: Validate PR metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.action != 'edited' || github.event.changes.title != null
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Install convco
        if: github.actor != 'dependabot[bot]'
        uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2.85.0
        with:
          tool: convco

      - name: Check commit messages
        if: github.actor != 'dependabot[bot]'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: convco check "$BASE_SHA..$HEAD_SHA"

      - name: Check PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$TITLE" | grep -qP '^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?!?: .+'; then
            echo "::error::PR title must follow conventional commits: type(scope)!: description"
            echo "  Got: $TITLE"
            exit 1
          fi

      - name: Auto label PR
        uses: actions/labeler@bf12e9b00b37c5c0ca2b87b79b2daf7891dbda13 # v6
        with:
          repo-token: '${{ secrets.GITHUB_TOKEN }}'

