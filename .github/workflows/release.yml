name: Release

on:
  workflow_dispatch:
    inputs:
      level:
        description: 'Release level (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-release and git-cliff
        uses: taiki-e/install-action@v2.75.10
        with:
          tool: cargo-release,git-cliff

      - name: Bump version with cargo-release
        run: |
          cargo release version ${{ github.event.inputs.level }} \
            --workspace \
            --no-confirm \
            --execute

      - name: Generate CHANGELOG
        run: git cliff -o CHANGELOG.md

      - name: Commit changelog and version
        run: |
          find . -name Cargo.toml -print0 | xargs -0 git add
          git add CHANGELOG.md
          git commit -m "chore: release"

      - name: Push changes
        run: git push

      - name: Tag release
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
