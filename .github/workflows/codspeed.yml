name: CodSpeed

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE*"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - ".vscode/**"
      - ".idea/**"
      - ".claude/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/labeler.yml"
      - ".github/dependabot.yml"
      - "CODEOWNERS"
      - "assets/**"
      - "**.png"
      - "**.jpg"
      - "**.svg"
  # No `paths-ignore` on `pull_request`: the per-shard dorny filter already
  # skips shards whose crates didn't change. Doc-only PR → shards == [] →
  # `codspeed` job skipped, aggregator-free (no required check to stick).
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  # `workflow_dispatch` allows CodSpeed to trigger backtest
  # performance analysis in order to generate initial data.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Sharding rationale:
# Suite is ~765 bench points across 22 files. CodSpeed recommends <1000 points
# per shard but a single shard at that size still takes too long. Splitting by
# package weight: resilience (12 files, ~400 points) and validator (6 files,
# ~150 points) get their own shards; the rest fit into one "misc" shard.
# All shards run in the same workflow so CodSpeed aggregates them into one report.
#
# Mode: simulation (default). Walltime mode requires CodSpeed Macro Runners
# (`runs-on: codspeed-macro`); on `ubuntu-latest` it produces unreliable data
# and triggers "Unknown Walltime execution environment detected" warnings.
# Simulation runs each bench once under cachegrind — deterministic, ignores
# criterion's sample_size/measurement_time, dramatically faster on hosted runners.
#
# Partial runs: on PR we build/run only shards whose crates changed. CodSpeed
# fills missing benches from the baseline (see codspeed.io/docs/features/partial-runs).
# On `main`, `merge_group`, and `workflow_dispatch` all shards run to refresh
# the baseline and avoid partial coverage in merge queue.
jobs:
  changes:
    name: Select shards
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      shards: ${{ steps.plan.outputs.shards }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect changed crates
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            resilience:
              - 'crates/resilience/**'
              - '.github/workflows/codspeed.yml'
            validator:
              - 'crates/validator/**'
              - '.github/workflows/codspeed.yml'
            core:
              - 'crates/core/**'
              - '.github/workflows/codspeed.yml'
            eventbus:
              - 'crates/eventbus/**'
              - '.github/workflows/codspeed.yml'
            expression:
              - 'crates/expression/**'
              - '.github/workflows/codspeed.yml'
            log:
              - 'crates/log/**'
              - '.github/workflows/codspeed.yml'
            system:
              - 'crates/system/**'
              - '.github/workflows/codspeed.yml'

      - name: Plan shards
        id: plan
        shell: bash
        env:
          R: ${{ steps.filter.outputs.resilience }}
          V: ${{ steps.filter.outputs.validator }}
          C: ${{ steps.filter.outputs.core }}
          E: ${{ steps.filter.outputs.eventbus }}
          X: ${{ steps.filter.outputs.expression }}
          L: ${{ steps.filter.outputs.log }}
          S: ${{ steps.filter.outputs.system }}
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref }}
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail

          # Full run on main push, merge queue, manual dispatch, or
          # `run-full-ci` label.
          force=0
          if [[ "$EVENT" == "workflow_dispatch" || "$EVENT" == "merge_group" ]] || [[ "$REF" == "refs/heads/main" ]]; then
            force=1
          fi
          if [[ -n "${LABELS:-}" ]] && jq -e '. | index("run-full-ci")' <<<"$LABELS" >/dev/null 2>&1; then
            force=1
          fi
          if [[ "$force" == "1" ]]; then
            R=true; V=true; C=true; E=true; X=true; L=true; S=true
          fi

          SHARDS='[]'
          # `jq -c` is required: `GITHUB_OUTPUT` only accepts single-line
          # values (or <<delimiter syntax); default pretty-print breaks
          # `fromJson()` in the matrix consumer.
          add() { SHARDS=$(jq -c --argjson x "$1" '. + [$x]' <<<"$SHARDS"); }
          M_PACKAGES=""
          add_misc_pkg() {
            if [[ -n "$M_PACKAGES" ]]; then
              M_PACKAGES+=" "
            fi
            M_PACKAGES+="-p $1"
          }

          [[ "$R" == "true" ]] && add '{"shard":"resilience","packages":"-p nebula-resilience"}'
          [[ "$V" == "true" ]] && add '{"shard":"validator","packages":"-p nebula-validator"}'
          [[ "$C" == "true" ]] && add_misc_pkg "nebula-core"
          [[ "$E" == "true" ]] && add_misc_pkg "nebula-eventbus"
          [[ "$X" == "true" ]] && add_misc_pkg "nebula-expression"
          [[ "$L" == "true" ]] && add_misc_pkg "nebula-log"
          [[ "$S" == "true" ]] && add_misc_pkg "nebula-system"
          if [[ -n "$M_PACKAGES" ]]; then
            add "$(jq -cn --arg packages "$M_PACKAGES" '{shard:"misc",packages:$packages}')"
          fi

          echo "shards=$SHARDS" >> "$GITHUB_OUTPUT"
          echo "Planned shards: $SHARDS"

  codspeed:
    name: Run benchmarks (${{ matrix.shard }})
    needs: [changes]
    # Gate is shard-level only: draft PRs still get partial CodSpeed feedback
    # on the shards they touch (matches per-shard partial-run design). Full
    # baseline runs are forced by main push, workflow_dispatch, or the
    # `run-full-ci` label (see `plan` step).
    if: needs.changes.outputs.shards != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.changes.outputs.shards) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@8cbdedb5103daa674dcf46d3590fe06a76645684 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
          shared-key: codspeed-${{ matrix.shard }}

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@481c34c1cf3a84c68b5e46f4eccfc82af798415a # v2.75.23
        with:
          tool: cargo-codspeed

      - name: Build the benchmark targets
        run: cargo codspeed build ${{ matrix.packages }}

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@db35df748deb45fdef0960669f57d627c1956c30 # v4
        with:
          mode: simulation
          run: cargo codspeed run ${{ matrix.packages }}
