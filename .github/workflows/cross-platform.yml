name: Cross-Platform Smoke

on:
  pull_request:
    paths:
      - "crates/sandbox/**"
      - "crates/runtime/**"
      - "crates/plugin-sdk/**"
      - ".github/workflows/cross-platform.yml"
  push:
    branches: [main]
  merge_group:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Cross-platform smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.9.1
        with:
          shared-key: cross-platform
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Test nebula-engine
        run: cargo test -p nebula-engine
      - name: Test nebula-plugin
        run: cargo test -p nebula-plugin
