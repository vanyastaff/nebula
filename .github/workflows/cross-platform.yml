name: Cross-Platform Smoke

on:
  pull_request:
    paths:
      - "crates/sandbox/**"
      - "crates/runtime/**"
      - "crates/plugin-sdk/**"
      - ".github/workflows/cross-platform.yml"
  push:
    branches: [main]
  merge_group:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Cross-platform smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross-platform
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Run platform-sensitive crate tests
        run: |
          cargo test -p nebula-sandbox
          cargo test -p nebula-runtime
          cargo test -p nebula-plugin-sdk
