name: Cross-Platform Smoke

on:
  pull_request:
    paths:
      - "crates/sandbox/**"
      - "crates/runtime/**"
      - "crates/plugin-sdk/**"
      - ".github/workflows/cross-platform.yml"
  push:
    branches: [main]
  merge_group:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Cross-platform smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.9.1
        with:
          shared-key: cross-platform
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Test nebula-sandbox
        run: cargo test -p nebula-sandbox
      - name: Test nebula-engine
        run: cargo test -p nebula-engine
      - name: Test nebula-plugin-sdk
        run: cargo test -p nebula-plugin-sdk
