name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Formatting (gate — everything else waits) ─────────────────────────────
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      # rustfmt.toml enables unstable options (group_imports,
      # imports_granularity, wrap_comments, format_code_in_doc_comments)
      # which only nightly rustfmt honours. Build/clippy/test jobs stay
      # on stable — only this gate is nightly-only.
      - name: Install nightly rustfmt
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  # ── Linting ────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    needs: [fmt]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-clippy
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Run Clippy lints
        run: cargo clippy --workspace -- -D warnings

  # ── Type check (includes --all-features) ───────────────────────────────────
  check:
    name: Check
    needs: [fmt]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-check
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Run cargo check
        run: cargo check --workspace --all-features --all-targets
      - name: Check no-default-features
        run: |
          cargo check -p nebula-resilience --no-default-features
          cargo check -p nebula-log --no-default-features
          cargo check -p nebula-expression --no-default-features

  # ── Doctests (workspace-wide, off the critical path) ──────────────────────
  doctests:
    name: Doctests
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-doctests
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Run doctests
        run: cargo test --workspace --doc

  # ── MSRV ───────────────────────────────────────────────────────────────────
  msrv:
    name: MSRV (1.94)
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust 1.94
        uses: dtolnay/rust-toolchain@1.94
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-msrv
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Run cargo check
        run: cargo check --workspace --all-targets

  # ── Documentation ──────────────────────────────────────────────────────────
  doc:
    name: Documentation
    needs: [check]
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-doc
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Build documentation
        run: cargo doc --no-deps --workspace

  # ── Benchmarks ─────────────────────────────────────────────────────────────
  bench:
    name: Benchmark Thresholds
    if: github.event_name != 'pull_request'
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-bench
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Run benchmarks
        run: cargo bench -p nebula-log --bench log_hot_path

  # ── Supply-chain audit ─────────────────────────────────────────────────────
  deny:
    name: Supply-chain audit (cargo deny)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny
      - name: Run cargo deny
        run: cargo deny check
