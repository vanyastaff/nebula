name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE*"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - ".vscode/**"
      - ".idea/**"
      - ".claude/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/labeler.yml"
      - ".github/dependabot.yml"
      - "CODEOWNERS"
      - "assets/**"
      - "**.png"
      - "**.jpg"
      - "**.svg"
  # `pull_request` intentionally has no `paths-ignore`: required checks would
  # be stuck in "waiting" on doc-only PRs if the workflow never triggers. Tier
  # 1 runs are cheap (~3 min) even for doc changes. `push:` keeps paths-ignore
  # because cost matters for main-branch cache warming.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Formatting (parallel, non-blocking gate) ──────────────────────────────
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96"
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Check + Lint (merged — clippy subsumes type-check) ────────────────────
  # Running clippy with the same flags as `cargo check` avoids a second full
  # workspace compilation. Feature-gated checks run afterwards on the warm
  # incremental cache.
  check:
    name: Check + Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96"
          components: clippy
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@8cbdedb5103daa674dcf46d3590fe06a76645684 # v2.9.1
        with:
          shared-key: ci-check
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Clippy (workspace, all features, all targets)
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings
      # Feature-matrix clippy (ENGINEERING_2026 C4): an all-features pass cannot
      # see code or attributes behind `cfg(not(feature = ...))` — a
      # `cfg_attr(not(feature = "x"), allow(...))` survived exactly this blind
      # spot in #951. `feature-hygiene` below runs `cargo hack check` per
      # feature (type errors), these two runs add the *lint* dimension for the
      # workspace-level default / no-default configurations on the warm cache.
      - name: Clippy (workspace, default features)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Clippy (workspace, no default features)
        run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings

  # ── Feature hygiene (the standalone-crate / modularity promise) ────────────
  # Modularity gate: each optional feature must build in isolation. cargo-hack
  # `--each-feature` checks every feature alone + `--no-default-features` +
  # all-default across the whole workspace, so a crate like nebula-resilience or
  # nebula-credential keeps building standalone with a minimal feature set.
  # This is per-feature, not a full `--feature-powerset`: it catches the real
  # "feature X doesn't compile on its own" / "no-default-features is broken"
  # regressions without the combinatorial cost of powerset on 8-feature crates
  # (storage, log), which would risk the job timeout.
  feature-hygiene:
    name: Feature Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96"
      - name: Install cargo-hack
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-hack
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@8cbdedb5103daa674dcf46d3590fe06a76645684 # v2.9.1
        with:
          shared-key: ci-feature-hygiene
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: cargo hack check (each feature, workspace)
        run: cargo hack check --each-feature --no-dev-deps --workspace

  # ── Doctests (workspace-wide, off the critical path) ──────────────────────
  # Tier 2: skipped on draft PRs — re-runs on `ready_for_review`.
  doctests:
    name: Doctests
    needs: [check]
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft != true ||
      contains(github.event.pull_request.labels.*.name, 'run-full-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96"
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@8cbdedb5103daa674dcf46d3590fe06a76645684 # v2.9.1
        with:
          shared-key: ci-doctests
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Run doctests
        run: cargo test --workspace --doc

  # ── MSRV ───────────────────────────────────────────────────────────────────
  # Tier 2: skipped on draft PRs.
  msrv:
    name: MSRV (1.96)
    needs: [check]
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft != true ||
      contains(github.event.pull_request.labels.*.name, 'run-full-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust 1.96
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96"
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@8cbdedb5103daa674dcf46d3590fe06a76645684 # v2.9.1
        with:
          shared-key: ci-msrv
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Run cargo check
        run: cargo check --workspace --all-targets

  # ── Documentation ──────────────────────────────────────────────────────────
  # Tier 2: skipped on draft PRs.
  doc:
    name: Documentation
    needs: [check]
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft != true ||
      contains(github.event.pull_request.labels.*.name, 'run-full-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96"
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@8cbdedb5103daa674dcf46d3590fe06a76645684 # v2.9.1
        with:
          shared-key: ci-doc
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Build documentation
        # `--document-private-items` so internal intra-doc links (private fns,
        # pub(crate) types, module docs) are link-checked too — broken internal
        # links rot silently otherwise and degrade `cargo doc` for contributors.
        run: cargo doc --no-deps --workspace --document-private-items

  # ── Benchmarks ─────────────────────────────────────────────────────────────
  bench:
    name: Benchmark Thresholds
    if: github.event_name != 'pull_request'
    needs: [check]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96"
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@8cbdedb5103daa674dcf46d3590fe06a76645684 # v2.9.1
        with:
          shared-key: ci-bench
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Run benchmarks
        run: cargo bench -p nebula-log --bench log_hot_path

  # ── Supply-chain audit ─────────────────────────────────────────────────────
  # Tier 2: skipped on draft PRs.
  deny:
    name: Supply-chain audit (cargo deny)
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft != true ||
      contains(github.event.pull_request.labels.*.name, 'run-full-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96"
      - name: Install cargo-deny
        uses: taiki-e/install-action@481c34c1cf3a84c68b5e46f4eccfc82af798415a # v2.75.23
        with:
          tool: cargo-deny
      - name: Run cargo deny
        run: cargo deny check

  # ── Test-dep leak gate (reth pattern, ENGINEERING_2026 §2.3) ──────────────
  # Test-only crates must never reach the release binaries' normal dependency
  # graph — they inflate the binary and widen the supply-chain surface.
  # `-e normal` excludes dev-dependencies, so a hit means a test-only crate is
  # wired as a real dependency somewhere in the tree.
  test-dep-leak:
    name: No test deps in release binaries
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96"
      - name: Assert test-only crates absent from binary dep trees
        run: |
          set -euo pipefail
          for bin in nebula-server nebula-worker-bin; do
            if cargo tree -p "$bin" -e normal --all-features \
               | grep -E '\b(proptest|arbitrary|rstest|mockall|wiremock|criterion|insta|loom|quickcheck|fake)\b'; then
              echo "::error::test-only crate found in $bin normal dependency tree"
              exit 1
            fi
          done

  # ── Public API surface gate (ENGINEERING_2026 Tier 1 §4; iroh/wasmtime) ───
  # `cargo-check-external-types` asserts the API-boundary crates (`sdk`, `api`)
  # only expose third-party types from their explicit allowlists
  # (`[package.metadata.cargo_check_external_types]` in each Cargo.toml).
  # The nightly toolchain is pinned to the rustdoc JSON format the tool's
  # version understands (0.5.x ↔ format 57 ↔ nightly-2026-03-20); bump the
  # two together.
  external-types:
    name: Public API surface (sdk, api)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pinned nightly (rustdoc JSON format 57)
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly-2026-03-20
      - name: Install cargo-check-external-types
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-check-external-types@0.5.0
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@8cbdedb5103daa674dcf46d3590fe06a76645684 # v2.9.1
        with:
          shared-key: ci-external-types
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Check sdk public surface
        working-directory: crates/sdk
        run: cargo +nightly-2026-03-20 check-external-types --all-features
      - name: Check api public surface
        working-directory: crates/api
        run: cargo +nightly-2026-03-20 check-external-types --all-features

  # ── Required aggregator ───────────────────────────────────────────────────
  # Single required check for branch protection. Treats `skipped` (draft-gated
  # tier 2 jobs) as success, but `failure`/`cancelled` fails the whole suite.
  required:
    name: CI
    if: always()
    needs: [fmt, check, feature-hygiene, doctests, msrv, doc, deny, test-dep-leak, external-types]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify required jobs
        env:
          FMT: ${{ needs.fmt.result }}
          CHECK: ${{ needs.check.result }}
          FEATURE_HYGIENE: ${{ needs.feature-hygiene.result }}
          DOCTESTS: ${{ needs.doctests.result }}
          MSRV: ${{ needs.msrv.result }}
          DOC: ${{ needs.doc.result }}
          DENY: ${{ needs.deny.result }}
          TEST_DEP_LEAK: ${{ needs.test-dep-leak.result }}
          EXTERNAL_TYPES: ${{ needs.external-types.result }}
        run: |
          set -euo pipefail
          fail=0
          for pair in "fmt=$FMT" "check=$CHECK" "feature-hygiene=$FEATURE_HYGIENE" \
                     "doctests=$DOCTESTS" "msrv=$MSRV" "doc=$DOC" "deny=$DENY" \
                     "test-dep-leak=$TEST_DEP_LEAK" "external-types=$EXTERNAL_TYPES"; do
            name="${pair%%=*}"
            result="${pair#*=}"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::$name: $result"
              fail=1
            fi
          done
          exit "$fail"
