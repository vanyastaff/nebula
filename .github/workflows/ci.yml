name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE*"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - ".vscode/**"
      - ".idea/**"
      - ".claude/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/labeler.yml"
      - ".github/dependabot.yml"
      - "CODEOWNERS"
      - "assets/**"
      - "**.png"
      - "**.jpg"
      - "**.svg"
  # `pull_request` intentionally has no `paths-ignore`: required checks would
  # be stuck in "waiting" on doc-only PRs if the workflow never triggers. Tier
  # 1 runs are cheap (~3 min) even for doc changes. `push:` keeps paths-ignore
  # because cost matters for main-branch cache warming.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Formatting (parallel, non-blocking gate) ──────────────────────────────
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96"
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Check + Lint (merged — clippy subsumes type-check) ────────────────────
  # Running clippy with the same flags as `cargo check` avoids a second full
  # workspace compilation. Feature-gated checks run afterwards on the warm
  # incremental cache.
  check:
    name: Check + Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96"
          components: clippy
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.9.1
        with:
          shared-key: ci-check
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Clippy (workspace, all features, all targets)
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings
      - name: Check nebula-resilience (no-default-features)
        run: cargo check -p nebula-resilience --no-default-features
      - name: Check nebula-log (no-default-features)
        run: cargo check -p nebula-log --no-default-features
      - name: Check nebula-expression (no-default-features)
        run: cargo check -p nebula-expression --no-default-features
      - name: Check nebula-api (no-default-features)
        run: cargo check -p nebula-api --no-default-features
      - name: Check nebula-credential (no-default-features)
        run: cargo check -p nebula-credential --no-default-features

  # ── Doctests (workspace-wide, off the critical path) ──────────────────────
  # Tier 2: skipped on draft PRs — re-runs on `ready_for_review`.
  doctests:
    name: Doctests
    needs: [check]
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft != true ||
      contains(github.event.pull_request.labels.*.name, 'run-full-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96"
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.9.1
        with:
          shared-key: ci-doctests
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Run doctests
        run: cargo test --workspace --doc

  # ── MSRV ───────────────────────────────────────────────────────────────────
  # Tier 2: skipped on draft PRs.
  msrv:
    name: MSRV (1.96)
    needs: [check]
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft != true ||
      contains(github.event.pull_request.labels.*.name, 'run-full-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Rust 1.96
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96"
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.9.1
        with:
          shared-key: ci-msrv
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Run cargo check
        run: cargo check --workspace --all-targets

  # ── Documentation ──────────────────────────────────────────────────────────
  # Tier 2: skipped on draft PRs.
  doc:
    name: Documentation
    needs: [check]
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft != true ||
      contains(github.event.pull_request.labels.*.name, 'run-full-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96"
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.9.1
        with:
          shared-key: ci-doc
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Build documentation
        run: cargo doc --no-deps --workspace

  # ── Benchmarks ─────────────────────────────────────────────────────────────
  bench:
    name: Benchmark Thresholds
    if: github.event_name != 'pull_request'
    needs: [check]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96"
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.9.1
        with:
          shared-key: ci-bench
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Run benchmarks
        run: cargo bench -p nebula-log --bench log_hot_path

  # ── Supply-chain audit ─────────────────────────────────────────────────────
  # Tier 2: skipped on draft PRs.
  deny:
    name: Supply-chain audit (cargo deny)
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft != true ||
      contains(github.event.pull_request.labels.*.name, 'run-full-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96"
      - name: Install cargo-deny
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-deny
      - name: Run cargo deny
        run: cargo deny check

  # ── Required aggregator ───────────────────────────────────────────────────
  # Single required check for branch protection. Treats `skipped` (draft-gated
  # tier 2 jobs) as success, but `failure`/`cancelled` fails the whole suite.
  required:
    name: CI
    if: always()
    needs: [fmt, check, doctests, msrv, doc, deny]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify required jobs
        env:
          FMT: ${{ needs.fmt.result }}
          CHECK: ${{ needs.check.result }}
          DOCTESTS: ${{ needs.doctests.result }}
          MSRV: ${{ needs.msrv.result }}
          DOC: ${{ needs.doc.result }}
          DENY: ${{ needs.deny.result }}
        run: |
          set -euo pipefail
          fail=0
          for pair in "fmt=$FMT" "check=$CHECK" \
                     "doctests=$DOCTESTS" "msrv=$MSRV" "doc=$DOC" "deny=$DENY"; do
            name="${pair%%=*}"
            result="${pair#*=}"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::$name: $result"
              fail=1
            fi
          done
          exit "$fail"
