name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE*"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - ".vscode/**"
      - ".idea/**"
      - ".claude/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/labeler.yml"
      - ".github/dependabot.yml"
      - "CODEOWNERS"
      - "assets/**"
      - "**.png"
      - "**.jpg"
      - "**.svg"
  # `pull_request` intentionally has no `paths-ignore`: required checks would
  # be stuck in "waiting" on doc-only PRs if the workflow never triggers. Tier
  # 1 runs are cheap (~3 min) even for doc changes. `push:` keeps paths-ignore
  # because cost matters for main-branch cache warming.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Formatting (gate — everything else waits) ─────────────────────────────
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # rustfmt.toml enables unstable options (group_imports,
      # imports_granularity, wrap_comments, format_code_in_doc_comments)
      # which only nightly rustfmt honours. Build/clippy/test jobs stay
      # on stable — only this gate is nightly-only.
      - name: Install nightly rustfmt
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly
          components: rustfmt
      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  # ── Linting ────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    needs: [fmt]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95"
          components: clippy
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@8cbdedb5103daa674dcf46d3590fe06a76645684 # v2.9.1
        with:
          shared-key: ci-clippy
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Run Clippy lints
        run: cargo clippy --workspace -- -D warnings

  # ── Type check (includes --all-features) ───────────────────────────────────
  check:
    name: Check
    needs: [fmt]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95"
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@8cbdedb5103daa674dcf46d3590fe06a76645684 # v2.9.1
        with:
          shared-key: ci-check
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Run cargo check
        run: cargo check --workspace --all-features --all-targets
      - name: Check no-default-features
        run: |
          cargo check -p nebula-resilience --no-default-features
          cargo check -p nebula-log --no-default-features
          cargo check -p nebula-expression --no-default-features
          cargo check -p nebula-api --no-default-features
          cargo check -p nebula-credential --no-default-features

  # ── Doctests (workspace-wide, off the critical path) ──────────────────────
  # Tier 2: skipped on draft PRs — re-runs on `ready_for_review`.
  doctests:
    name: Doctests
    needs: [check]
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft != true ||
      contains(github.event.pull_request.labels.*.name, 'run-full-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95"
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@8cbdedb5103daa674dcf46d3590fe06a76645684 # v2.9.1
        with:
          shared-key: ci-doctests
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Run doctests
        run: cargo test --workspace --doc

  # ── MSRV ───────────────────────────────────────────────────────────────────
  # Tier 2: skipped on draft PRs.
  msrv:
    name: MSRV (1.95)
    needs: [check]
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft != true ||
      contains(github.event.pull_request.labels.*.name, 'run-full-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95"
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@8cbdedb5103daa674dcf46d3590fe06a76645684 # v2.9.1
        with:
          shared-key: ci-msrv
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Run cargo check
        run: cargo check --workspace --all-targets

  # ── Documentation ──────────────────────────────────────────────────────────
  # Tier 2: skipped on draft PRs.
  doc:
    name: Documentation
    needs: [check]
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft != true ||
      contains(github.event.pull_request.labels.*.name, 'run-full-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95"
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@8cbdedb5103daa674dcf46d3590fe06a76645684 # v2.9.1
        with:
          shared-key: ci-doc
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Build documentation
        run: cargo doc --no-deps --workspace

  # ── Benchmarks ─────────────────────────────────────────────────────────────
  bench:
    name: Benchmark Thresholds
    if: github.event_name != 'pull_request'
    needs: [check]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95"
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@8cbdedb5103daa674dcf46d3590fe06a76645684 # v2.9.1
        with:
          shared-key: ci-bench
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-on-failure: true
      - name: Run benchmarks
        run: cargo bench -p nebula-log --bench log_hot_path

  # ── Supply-chain audit ─────────────────────────────────────────────────────
  # Tier 2: skipped on draft PRs.
  deny:
    name: Supply-chain audit (cargo deny)
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft != true ||
      contains(github.event.pull_request.labels.*.name, 'run-full-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95"
      - name: Install cargo-deny
        uses: taiki-e/install-action@481c34c1cf3a84c68b5e46f4eccfc82af798415a # v2.75.23
        with:
          tool: cargo-deny
      - name: Run cargo deny
        run: cargo deny check

  # ── Required aggregator ───────────────────────────────────────────────────
  # Single required check for branch protection. Treats `skipped` (draft-gated
  # tier 2 jobs) as success, but `failure`/`cancelled` fails the whole suite.
  # Replace the 6 individual required checks in the ruleset with just `CI`.
  required:
    name: CI
    if: always()
    needs: [fmt, clippy, check, doctests, msrv, doc, deny]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify required jobs
        env:
          FMT: ${{ needs.fmt.result }}
          CLIPPY: ${{ needs.clippy.result }}
          CHECK: ${{ needs.check.result }}
          DOCTESTS: ${{ needs.doctests.result }}
          MSRV: ${{ needs.msrv.result }}
          DOC: ${{ needs.doc.result }}
          DENY: ${{ needs.deny.result }}
        run: |
          set -euo pipefail
          fail=0
          for pair in "fmt=$FMT" "clippy=$CLIPPY" "check=$CHECK" \
                     "doctests=$DOCTESTS" "msrv=$MSRV" "doc=$DOC" "deny=$DENY"; do
            name="${pair%%=*}"
            result="${pair#*=}"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::$name: $result"
              fail=1
            fi
          done
          exit "$fail"
