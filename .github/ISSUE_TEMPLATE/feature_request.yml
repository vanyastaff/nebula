name: 🚀 Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Have an idea that would make Nebula better? Describe it below.
        Check the [Roadmap](https://github.com/vanyastaff/nebula/blob/main/docs/ROADMAP.md) first to see if it is already planned.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem are you trying to solve? Why is the current behaviour insufficient?
      placeholder: "Currently, there is no way to …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you would like to see.
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: Proposed API / Interface (optional)
      description: If applicable, sketch out what the Rust API, config schema, or CLI command might look like.
      render: rust

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches or workarounds?

  - type: input
    id: crate
    attributes:
      label: Affected or New Crate(s)
      description: "Which crate(s) would this affect or require? e.g. `nebula-engine`, new `nebula-scheduler`"
      placeholder: "nebula-…"

  - type: dropdown
    id: phase
    attributes:
      label: Roadmap Phase
      description: Which phase does this belong to?
      options:
        - "Phase 2 — Execution Engine"
        - "Phase 3 — Credential & Plugin"
        - "Phase 4 — Developer Experience"
        - "Phase 5 — API & UI"
        - "Not sure / Other"

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to implement this feature and open a pull request.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: "Links, references, or any other context."
