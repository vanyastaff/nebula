name: 🐛 Bug Report
description: Report a reproducible bug or unexpected behaviour
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the sections below to help us understand and reproduce the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behaviour.
      placeholder: |
        1. Create a workflow with …
        2. Call `execute(…)` with …
        3. Observe the error / wrong output
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened? Include error messages, stack traces, or panic output.
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal Reproducer (code)
      description: If applicable, provide a minimal Rust snippet or test that reproduces the issue.
      render: rust

  - type: input
    id: crate
    attributes:
      label: Affected Crate(s)
      description: "Which crate(s) does this affect? e.g. `nebula-engine`, `nebula-validator`"
      placeholder: "nebula-…"

  - type: input
    id: version
    attributes:
      label: Nebula Version / Git SHA
      description: "Output of `cargo metadata` version or the commit SHA you are on."
      placeholder: "0.1.0 / abc1234"
    validations:
      required: true

  - type: input
    id: rust_version
    attributes:
      label: Rust Version
      description: "Output of `rustc --version`."
      placeholder: "rustc 1.93.0 (…)"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Ubuntu 24.04 / macOS 14 / Windows 11"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: "Any other context, logs, or screenshots."
