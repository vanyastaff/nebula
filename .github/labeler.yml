# Labeler configuration for PRs.
# Labels are applied automatically based on the files changed.
# Docs: https://github.com/actions/labeler

docs:
  - changed-files:
    - any-glob-to-any-file:
      - 'docs/**'
      - '*.md'
      - '.github/*.md'

ci:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/workflows/**'
      - '.github/dependabot.yml'
      - 'clippy.toml'
      - 'rustfmt.toml'
      - 'deny.toml'

rust:
  - changed-files:
    - any-glob-to-any-file:
      - 'crates/**'
      - 'plugins/**'

migrations:
  - changed-files:
    - any-glob-to-any-file:
      - 'migrations/**'

deploy:
  - changed-files:
    - any-glob-to-any-file:
      - 'deploy/**'
      - '.dockerignore'

frontend:
  - changed-files:
    - any-glob-to-any-file:
      - 'apps/**'

release:
  - changed-files:
    - any-glob-to-any-file:
      - 'CHANGELOG.md'
      - 'Cargo.toml'
      - 'Cargo.lock'

