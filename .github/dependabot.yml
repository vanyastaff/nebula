version: 2

updates:
  # Cargo workspace (all crates)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    assignees:
      - "vanyastaff"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "skip-coderabbit"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Group all minor+patch updates into one PR
      rust-minor-patch:
        update-types:
          - "minor"
          - "patch"
      # Major updates get individual PRs (breaking changes)

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    assignees:
      - "vanyastaff"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "skip-coderabbit"
    commit-message:
      prefix: "chore(ci)"
    ignore:
      # `dtolnay/rust-toolchain` is SHA-pinned with a `# v1` comment in
      # ci.yml; the MSRV (currently 1.95) is passed via the `toolchain:`
      # input, not the action ref. Dependabot would otherwise open weekly
      # PRs bumping the action's SHA — we prefer to review and roll that
      # action by hand since it installs the compiler for every CI job.
      - dependency-name: "dtolnay/rust-toolchain"
    groups:
      # Group all action updates into one PR
      actions:
        patterns:
          - "*"
