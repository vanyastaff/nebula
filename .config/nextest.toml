# nextest configuration
# https://nexte.st/docs/configuration/

[profile.default]
# Use up to all available CPUs
test-threads = "num-cpus"

[profile.ci]
# Retry flaky tests up to 2 times
retries = 2
# Treat tests running longer than 60s as slow
slow-timeout = { period = "60s", terminate-after = 3 }
# Status reporting
status-level = "skip"
final-status-level = "flaky"
# Fail fast on first failure in CI
fail-fast = true
# JUnit output for CI integration (GitHub annotations, Codecov, etc.)
[profile.ci.junit]
path = "junit.xml"

[profile.agent]
# Optimized for LLM-driven invocation: tight, fail-fast, no spinner/emoji.
status-level = "fail"
final-status-level = "fail"
failure-output = "immediate"
success-output = "never"
fail-fast = true
slow-timeout = { period = "30s", terminate-after = 2 }

[profile.chaos]
# Long-running chaos profile (e.g. nightly-chaos.yml).
# Inherits nothing from `ci` — the chaos-full plane intentionally runs
# for 10 minutes (refresh_coordinator_chaos), which would be killed by
# the `ci` profile's slow-timeout × terminate-after = 180s ceiling.
retries = 0
fail-fast = false
status-level = "pass"
final-status-level = "fail"
# Allow up to 30 minutes per test before slow-flag, terminate after a
# second 30-min interval. Generous so an oversubscribed runner does not
# kill the chaos run mid-assertion.
slow-timeout = { period = "30m", terminate-after = 2 }
[profile.chaos.junit]
path = "junit.xml"
