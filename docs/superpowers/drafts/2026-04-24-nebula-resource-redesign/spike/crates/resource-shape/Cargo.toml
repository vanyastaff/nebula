[package]
name = "resource-shape"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish = false

[dependencies]
# The thing we're validating against. Pulled from the main workspace by
# path so we exercise the real `Credential` trait, not a stub.
nebula-credential = { path = "../../../crates/credential" }
# Needed because `Credential::Input: HasSchema` and `Credential::resolve`
# takes `FieldValues` — these types are not re-exported by nebula-credential.
nebula-schema = { path = "../../../crates/schema" }

# Async primitives. `futures` for `join_all` rotation dispatch per
# Strategy §4.3.
futures = "0.3"
tokio = { version = "1", features = ["sync", "time", "macros", "rt", "rt-multi-thread"] }
tracing = "0.1"
thiserror = "2"
serde = { version = "1", features = ["derive"] }

[lints]
workspace = true
