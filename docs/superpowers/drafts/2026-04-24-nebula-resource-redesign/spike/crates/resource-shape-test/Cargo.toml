[package]
name = "resource-shape-test"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish = false

[dependencies]
resource-shape = { path = "../resource-shape" }
nebula-credential = { path = "../../../crates/credential" }
nebula-schema = { path = "../../../crates/schema" }

futures = "0.3"
tokio = { version = "1", features = ["sync", "time", "macros", "rt", "rt-multi-thread"] }
thiserror = "2"
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
tokio = { version = "1", features = [
  "sync",
  "time",
  "macros",
  "rt",
  "rt-multi-thread",
  "test-util",
] }

[lib]
path = "src/lib.rs"

[lints]
workspace = true
