# Phase 4 spike — Resource v2 trait shape validation.
#
# Standalone workspace; depends on `nebula-credential` from the main
# nebula workspace via path. We do NOT modify production crates; this
# tree is read-only against `crates/credential` and exists only to
# validate that the §3.6 trait shape compiles before Phase 6 Tech Spec
# elaborates it.
#
# Strategy lock: spike does NOT explore alternatives. If §3.6 fails to
# compile, see ./FAIL.md (escalation) — do not introduce sub-trait
# fallback (Strategy §2.4 amendment 1).
[workspace]
members = ["crates/resource-shape", "crates/resource-shape-test"]
resolver = "3"

[workspace.package]
version = "0.0.0-spike"
edition = "2024"
rust-version = "1.95"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
# Spike: keep noise low. Production hardening is Phase 6's job.
# Allow these explicitly so the spike compiles cleanly without
# fighting the workspace's pedantic baseline.
all = { level = "deny", priority = -1 }
