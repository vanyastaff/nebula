[advisories]
ignore = [
    # rsa 0.9.9: Marvin Attack timing sidechannel (transitive via sqlx-mysql).
    # No fixed version available upstream. Track: https://rustsec.org/advisories/RUSTSEC-2023-0071
    "RUSTSEC-2023-0071",
    # rand unsoundness under custom logger + thread-local RNG interaction; not used in Nebula paths.
    # Track: https://rustsec.org/advisories/RUSTSEC-2026-0097
    "RUSTSEC-2026-0097",
    # atomic-polyfill: unmaintained (transitive: postcard → heapless). Not a vulnerability.
    # Track: https://rustsec.org/advisories/RUSTSEC-2023-0089
    "RUSTSEC-2023-0089",
    # rustls-webpki URI name-constraint handling issue; Nebula does not perform URI SAN assertions.
    # Track: https://rustsec.org/advisories/RUSTSEC-2026-0098
    "RUSTSEC-2026-0098",
    # rustls-webpki wildcard name-constraint issue; affected crate is pinned transitively by AWS rustls 0.21 stack.
    # Track: https://rustsec.org/advisories/RUSTSEC-2026-0099
    "RUSTSEC-2026-0099",
]

[output]
format = "terminal"
quiet = false
