apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nebula-api
  labels:
    app.kubernetes.io/name: nebula-api
    app.kubernetes.io/component: api
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  tls:
    - hosts:
        - nebula.example.com
      secretName: nebula-api-tls
  rules:
    - host: nebula.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nebula-api
                port:
                  number: 80

