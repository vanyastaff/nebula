# Observability stack for local tracing checks (nebula-log telemetry).
# Run from repo root:
#   docker compose -f deploy/docker/docker-compose.observability.yml up -d

services:
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: nebula-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.146.1
    container_name: nebula-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      - jaeger
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC endpoint for app
      - "4318:4318" # OTLP HTTP endpoint for app
