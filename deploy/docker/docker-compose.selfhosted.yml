# Self-hosted baseline stack (single-node, production-oriented defaults).
# Run from repo root:
#   docker compose -f deploy/docker/docker-compose.selfhosted.yml up -d --build

name: nebula

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  postgres:
    image: postgres:17-alpine
    container_name: nebula-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nebula}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nebula}
      POSTGRES_DB: ${POSTGRES_DB:-nebula}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - nebula_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nebula} -d ${POSTGRES_DB:-nebula}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    pids_limit: 200
    logging: *default-logging
    networks:
      - nebula_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nebula-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - nebula_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    user: "999:999"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    pids_limit: 100
    logging: *default-logging
    networks:
      - nebula_net
    restart: unless-stopped

  api:
    image: ${NEBULA_API_IMAGE:-nebula-api:local}
    container_name: nebula-api
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
      target: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://nebula:nebula@postgres:5432/nebula}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RUST_LOG: ${RUST_LOG:-info}
      NEBULA_LOG: ${NEBULA_LOG:-info}
      NEBULA_API_BIND: ${NEBULA_API_BIND:-0.0.0.0:5678}
      NEBULA_WORKER_COUNT: ${NEBULA_WORKER_COUNT:-4}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      GITHUB_OAUTH_REDIRECT_URI: ${GITHUB_OAUTH_REDIRECT_URI:-http://localhost:5678/auth/github/callback}
    ports:
      - "${API_PORT:-5678}:5678"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    user: "1001:1001"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:5678/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    pids_limit: 256
    logging: *default-logging
    networks:
      - nebula_net
    restart: unless-stopped

volumes:
  nebula_pgdata:
  nebula_redis_data:

networks:
  nebula_net:
    driver: bridge
