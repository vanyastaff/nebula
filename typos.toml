[files]
extend-exclude = [
  "target",
  ".worktrees",
  ".claude/worktrees",
  "docs/plans",
  "docs/superpowers",
  "crates/action/docs",
  "docs/plans/archive",
  "docs/guidelines/research",
  # Spike iterations — reference-only artefacts, not production code.
  "spike-iter-1-2",
  "spike-iter-3",
  # Competitor research v2 — harvested upstream docs/code with their own conventions.
  "findings",
